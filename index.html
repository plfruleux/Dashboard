<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Dashboard</title>

<!-- ── Favicon (onglet navigateur) ── -->
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png"/>

<!-- ── PWA : iOS / Apple ──
     'precomposed' empêche iOS d'ajouter des effets/cadres automatiques sur l'icône -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dashboard"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"/>
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png"/>
<link rel="apple-touch-icon" sizes="76x76" href="/icon-76.png"/>
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-icon-precomposed" sizes="167x167" href="/icon-167.png"/>
<link rel="apple-touch-icon-precomposed" sizes="152x152" href="/icon-152.png"/>

<!-- ── PWA : Android / Chrome ── -->
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07080b"/>
<link rel="manifest" href="/manifest.json"/>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/*
  Banshift SemiBold : placez Banshift-SemiBold.woff2 dans le même dossier et décommentez :
  @font-face {
    font-family:'Banshift';
    src:url('Banshift-SemiBold.woff2') format('woff2');
    font-weight:600;
  }
*/
:root{
  --bg:#07080b;
  --glass:rgba(6,7,12,0.20);
  --gl2:rgba(6,7,12,0.32);
  --gl-light:rgba(255,255,255,0.022);
  --border:rgba(255,255,255,0.07);
  --bds:rgba(255,255,255,0.13);
  --accent:#d4a853;
  --adim:rgba(212,168,83,0.14);
  --t1:rgba(240,236,228,0.95);
  --t2:rgba(240,236,228,0.56);
  --t3:rgba(240,236,228,0.28);
  --green:#4caf7d;--yellow:#f0b429;--red:#e05c5c;--blue:#5b9fd4;
  --r:11px;
  --fd:'Banshift','Outfit',sans-serif;
  --fm:'DM Mono',monospace;
  --fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--fb);font-weight:300;}

/* SLIDESHOW */
#bg-a,#bg-b{position:fixed;top:0;right:0;bottom:0;left:0;background-size:cover;background-position:center;z-index:0;transition:opacity 2.4s ease-in-out;}
/* Fond statique de remplacement (le diaporama dynamique d'origine a été retiré,
   voir commentaire dans le script principal) — dégradé sombre avec une touche
   d'accent doré, pour ne pas laisser un fond totalement vide. */
#bg-a{opacity:.42;background-image:radial-gradient(ellipse at 30% 20%, rgba(212,168,83,0.16) 0%, transparent 55%), linear-gradient(160deg, #10131a 0%, #05060a 100%);} 
#bg-b{opacity:0;}
#vig{position:fixed;top:0;right:0;bottom:0;left:0;background:radial-gradient(ellipse at 50% 35%,transparent 0%,rgba(4,5,9,0.58) 100%);z-index:1;pointer-events:none;}

/* ── Spotlight curseur ── */
#spotlight{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;pointer-events:none;
  background:radial-gradient(circle 420px at var(--sx,50%) var(--sy,50%),
    rgba(212,168,83,0.045) 0%,
    rgba(212,168,83,0.012) 40%,
    transparent 70%);
  transition:--sx .08s,--sy .08s;
  opacity:0;-webkit-transition:opacity .6s;transition:opacity .6s;
}
#spotlight.on{opacity:1;}

/* ── Cartes : tilt 3D au survol ── */
.card{
  -webkit-transform-style:preserve-3d;transform-style:preserve-3d;
  -webkit-transform:perspective(900px) rotateX(0) rotateY(0);
  transform:perspective(900px) rotateX(0) rotateY(0);
  -webkit-transition:transform .25s ease,box-shadow .25s ease;
  transition:transform .25s ease,box-shadow .25s ease;
  will-change:transform;
}
/* Reflet interne sur la carte — suit la souris locale */
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;z-index:0;
  background:radial-gradient(circle 180px at var(--cx,50%) var(--cy,50%),
    rgba(255,255,255,0.055) 0%,
    transparent 70%);
  pointer-events:none;opacity:0;
  -webkit-transition:opacity .3s;transition:opacity .3s;
}
.card:hover::before{opacity:1;}
/* ══════════════════════════════════════════════
   LAYOUT — compatible TV/iPad/navigateurs anciens
   gap: remplacé par margin-bottom sur les cartes
══════════════════════════════════════════════ */
.grid{
  position:relative;z-index:10;
  display:grid;
  grid-template-columns:320px 1fr;
  grid-gap:24px;
  padding:22px 24px;
  /* iPad Air 1 / tvOS : 100vh inclut la barre URL → cartes coupées en bas.
     Override avec calc(--vh * 100) où --vh est la vraie hauteur (window.innerHeight) */
  height:100vh;
  height:calc(var(--vh, 1vh) * 100);
  max-height:100vh;
  max-height:calc(var(--vh, 1vh) * 100);
  overflow:hidden;
}
.left-col{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  min-height:0;height:100%;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
.left-col::-webkit-scrollbar{display:none;}
/* Espacement via margin — fonctionne sur tout navigateur TV */
.left-col > .card{ margin-bottom:10px; flex-shrink:0; }
.left-col > .card:last-child{ margin-bottom:0; }
/* RSS dynamique — flex:1 pour remplir l'espace restant */
#card-rss{
  -webkit-box-flex:1;-ms-flex:1 1 auto;flex:1 1 auto;
  min-height:120px;overflow:hidden;
  display:flex;flex-direction:column;
}
#card-rss .ci{ height:100%; display:flex; flex-direction:column; min-height:0; }
#card-rss .rss-ticker{
  -webkit-box-flex:1;-ms-flex:1 1 auto;flex:1 1 auto;
  overflow-y:auto;overflow-x:hidden;
  min-height:0;
  padding-right:4px;
  /* Masquer la scrollbar par défaut, fine au hover */
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.1) transparent;
}
#card-rss .rss-ticker::-webkit-scrollbar{width:3px;}
#card-rss .rss-ticker::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
#card-rss .rss-ticker::-webkit-scrollbar-track{background:transparent;}
@media(min-width:1800px){
  .grid{grid-template-columns:380px 1fr;grid-gap:30px;padding:28px 30px;}
  .left-col > .card{margin-bottom:14px;}
}
@media(max-width:1023px){
  .grid{grid-template-columns:260px 1fr;grid-gap:14px;padding:14px;}
  .left-col > .card{margin-bottom:8px;}
}
@media(max-height:700px){
  #card-weather{max-height:220px;}
  .w-hourly-wrap{display:none;}
}

/* CARD */
.card{
  background:rgba(8,10,17,0.72);          /* fallback plus lumineux pour navigateurs sans backdrop-filter */
  border:2px solid rgba(255,255,255,0.11);
  border-radius:var(--r);
  overflow:hidden;position:relative;
  animation:fadeUp .5s ease both;
  flex-shrink:0;
  /* Fix border-radius+overflow sur vieux WebKit (TV, iPad ancien) */
  -webkit-mask-image:-webkit-radial-gradient(white,black);
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
  transition:border-color .25s, box-shadow .25s, -webkit-transform .25s;
  transition:border-color .25s, box-shadow .25s, transform .25s;
}
.card:hover{
  border-color:rgba(255,255,255,0.20);
  box-shadow:0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(212,168,83,.08);
  -webkit-transform:translateZ(0) translateY(-2px);
  transform:translateY(-2px);
}
/* Pas de lift sur la carte calendrier (trop grande) */
#card-cal:hover{ -webkit-transform:none; transform:none; box-shadow:0 0 0 1px rgba(212,168,83,.10); }

/* ── Effet glass moderne ──
   Quand backdrop-filter est supporté (Safari iOS 9+, Chrome 76+, Firefox 103+),
   on baisse l'opacité et le flou pour un rendu plus lumineux et net.
   Sinon on garde le fallback opaque. */
@supports (-webkit-backdrop-filter: blur(8px)) or (backdrop-filter: blur(8px)) {
  .card {
    background: rgba(8,10,17,0.40);
    -webkit-backdrop-filter: blur(8px) saturate(1.5) brightness(1.05);
    backdrop-filter: blur(8px) saturate(1.5) brightness(1.05);
  }
  #card-weather {
    background: rgba(8,10,17,0.32);
  }
}

.card::after{content:'';position:absolute;top:0;right:0;bottom:0;left:0;border-radius:inherit;background:linear-gradient(150deg,rgba(255,255,255,0.025) 0%,transparent 50%);pointer-events:none;}
.ci{padding:10px 13px;display:flex;flex-direction:column;}
#card-cal .ci{height:100%;}
.chip{font-family:var(--fm);font-size:6.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;flex-shrink:0;transition:color .2s;}
.card:hover .chip{ color:rgba(240,236,228,0.45); }
/* Horloge hover */
#card-clock:hover #fr-time{ text-shadow:0 0 22px rgba(212,168,83,.4); }
.divl{height:1px;background:rgba(255,255,255,0.10);margin:6px 0;flex-shrink:0;}

/* ══ CLOCK + POMODORO — fonctionnel ══ */
#card-clock{flex-shrink:0;overflow:hidden;}
#card-clock .ci{padding:0;overflow:hidden;}

/* Conteneur splitté côte à côte — les proportions changent quand le
   pomodoro démarre (classe .pomo-active posée sur #card-clock). */
.ck-split{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:horizontal;-webkit-box-direction:normal;
  -ms-flex-direction:row;flex-direction:row;
}

/* ─ Moitié gauche : horloge ─ */
.ck-left{
  -webkit-box-flex:1;-ms-flex:1 1 0;flex:1 1 0;min-width:0;
  border-right:1px solid rgba(255,255,255,0.11);
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:flex .45s cubic-bezier(.4,0,.2,1);
}
.ck-main{
  padding:13px 14px;
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:padding .45s cubic-bezier(.4,0,.2,1);
}
#fr-time{
  font-family:var(--fd);font-size:42px;font-weight:800;
  line-height:.95;letter-spacing:.005em;color:var(--t1);
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:horizontal;-webkit-box-direction:normal;
  -ms-flex-direction:row;flex-direction:row;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:font-size .45s cubic-bezier(.4,0,.2,1),flex-direction 0s .2s;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#fr-h,#fr-m{ min-width:1.1em;text-align:center; }
.sep{color:var(--accent);margin:0 1px;} /* clignotement retiré */
#fr-date{
  font-family:var(--fm);font-size:6px;
  color:var(--t3);letter-spacing:.07em;
  margin-top:6px;text-transform:capitalize;
  transition:opacity .25s ease,max-height .3s ease;
}
.ck-vn{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-align:baseline;-ms-flex-align:baseline;align-items:baseline;
  gap:9px;padding:7px 14px 9px;
  border-top:1px solid rgba(255,255,255,0.06);
  transition:opacity .25s ease,max-height .3s ease;
}
.ck-vn-lbl{
  font-family:var(--fm);font-size:5.5px;letter-spacing:.3em;
  text-transform:uppercase;color:var(--t3);
  flex-shrink:0;
}
#vn-time{
  font-family:var(--fd);font-size:15px;font-weight:600;
  color:rgba(240,236,228,0.6);letter-spacing:.01em;line-height:1;
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#vn-diff{
  font-family:var(--fm);font-size:5.5px;color:var(--accent);
  letter-spacing:.06em;flex-shrink:0;
}
/* État pomodoro actif : l'horloge se réduit à la taille de son contenu
   (pas de largeur fixe), l'heure passe en vertical (HH au-dessus de MM)
   pour occuper le moins de place possible, avec le même espacement que
   celui du bloc pomodoro voisin. */
#card-clock.pomo-active .ck-left{ -webkit-box-flex:0;-ms-flex:0 0 auto;flex:0 0 auto; }
#card-clock.pomo-active .ck-main{ padding:10px 14px; }
#card-clock.pomo-active #fr-time{
  font-size:15px;line-height:1.15;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  gap:1px;
}
#card-clock.pomo-active #fr-time .sep{ display:none; }
#card-clock.pomo-active #fr-date,
#card-clock.pomo-active .ck-vn{ display:none; }
#card-clock.pomo-active .ck-right{ -webkit-box-flex:2;-ms-flex:2 1 0;flex:2 1 0; }

/* ─ Moitié droite : pomodoro ─ */
.ck-right{
  -webkit-box-flex:1;-ms-flex:1 1 0;flex:1 1 0;min-width:0;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  position:relative;transition:flex .45s cubic-bezier(.4,0,.2,1);
}
#pom-fullscreen-btn{
  position:absolute;top:6px;right:7px;z-index:2;
  background:none;border:none;cursor:pointer;
  color:var(--t3);font-size:11px;padding:2px 4px;line-height:1;
  transition:color .2s,-webkit-transform .15s;transition:color .2s,transform .15s;
}
#pom-fullscreen-btn:hover{color:var(--accent);-webkit-transform:scale(1.15);transform:scale(1.15);}
.pom-body{
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  padding:8px 10px;gap:5px;
}
#pom-time{
  font-family:var(--fd);font-size:30px;font-weight:800;
  letter-spacing:-.02em;line-height:1;color:var(--t1);
  transition:color .3s;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#pom-time.pom-urgent{color:rgba(200,90,70,.9);}
.pom-prog-track{width:80%;height:1px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden;} 
.pom-prog-bar{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width 1s linear,background .3s;}
.pom-controls{display:-webkit-box;display:-ms-flexbox;display:flex;gap:7px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;}
#pom-btn{
  width:28px;height:28px;border-radius:50%;
  background:var(--adim);
  border:1px solid rgba(212,168,83,0.35);
  color:var(--accent);
  cursor:pointer;transition:all .18s;
  display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  padding:0;flex-shrink:0;
}
#pom-btn:hover{background:rgba(212,168,83,.22);border-color:rgba(212,168,83,.65);} 
#pom-btn svg{display:block;}
.pom-dots{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;}
.pom-dot{width:4px;height:4px;border-radius:50%;background:rgba(240,236,228,.15);transition:all .4s;} 
.pom-dot.done{background:rgba(240,236,228,.35);} 
.pom-dot.active{background:var(--accent);width:10px;border-radius:2px;}

/* Couleur d'accent selon la phase (travail / pause / grande pause) */
#card-clock.pom-mode-break #pom-time,
#pomo-full.pom-mode-break #pomo-full-time{color:var(--blue);}
#card-clock.pom-mode-break .pom-prog-bar,
#pomo-full.pom-mode-break .pom-prog-bar{background:var(--blue);}
#card-clock.pom-mode-break .pom-dot.active,
#pomo-full.pom-mode-break .pom-dot.active{background:var(--blue);}
#card-clock.pom-mode-long #pom-time,
#pomo-full.pom-mode-long #pomo-full-time{color:var(--green);}
#card-clock.pom-mode-long .pom-prog-bar,
#pomo-full.pom-mode-long .pom-prog-bar{background:var(--green);}
#card-clock.pom-mode-long .pom-dot.active,
#pomo-full.pom-mode-long .pom-dot.active{background:var(--green);}

/* ══ POMODORO PLEIN ÉCRAN ══
   Le fond reste le fond d'écran (#bg-a/#bg-b), simplement assombri et
   flouté davantage via backdrop-filter, pour rester cohérent avec le
   reste du dashboard sans dupliquer d'image. */
#pomo-full{
  position:fixed;inset:0;z-index:500;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  gap:26px;
  background:rgba(4,5,9,0.42);
  -webkit-backdrop-filter:blur(20px) saturate(1.1) brightness(.85);
  backdrop-filter:blur(20px) saturate(1.1) brightness(.85);
  opacity:0;visibility:hidden;pointer-events:none;
  -webkit-transform:scale(.9);transform:scale(.9);
  -webkit-transform-origin:92% 8%;transform-origin:92% 8%;
  transition:opacity .4s cubic-bezier(.22,.68,0,1.15),
             -webkit-transform .4s cubic-bezier(.22,.68,0,1.15);
  transition:opacity .4s cubic-bezier(.22,.68,0,1.15),
             transform .4s cubic-bezier(.22,.68,0,1.15);
}
#pomo-full.open{
  opacity:1;visibility:visible;pointer-events:auto;
  -webkit-transform:scale(1);transform:scale(1);
}
#pomo-full-close{
  position:absolute;top:20px;right:22px;
  background:none;border:1px solid rgba(255,255,255,.12);
  color:var(--t3);width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  font-size:13px;transition:color .15s,border-color .15s,-webkit-transform .15s;transition:color .15s,border-color .15s,transform .15s;
}
#pomo-full-close:hover{color:var(--accent);border-color:rgba(212,168,83,.4);-webkit-transform:rotate(90deg);transform:rotate(90deg);}
#pomo-full-time{
  font-family:var(--fd);font-size:min(24vw,220px);font-weight:800;
  color:var(--t1);line-height:1;letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
  transition:color .3s;
}
#pomo-full .pom-prog-track{width:min(60vw,320px);height:2px;background:rgba(255,255,255,.09);}
#pomo-full .pom-dots{gap:8px;}
#pomo-full .pom-dot{width:6px;height:6px;}
#pomo-full .pom-dot.active{width:18px;}
#pomo-full-btn{
  width:64px;height:64px;border-radius:50%;
  background:var(--adim);border:1px solid rgba(212,168,83,.35);
  color:var(--accent);cursor:pointer;
  display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:background .18s,border-color .18s,-webkit-transform .1s;transition:background .18s,border-color .18s,transform .1s;
}
#pomo-full-btn:hover{background:rgba(212,168,83,.22);-webkit-transform:scale(1.06);transform:scale(1.06);}
#pomo-full-clock{
  position:absolute;bottom:22px;left:0;right:0;text-align:center;
  font-family:var(--fm);font-size:10px;letter-spacing:.12em;color:var(--t3);
}

/* ══════════════════════════════════════════════
   MÉTÉO — widget minimaliste, glass, sans appel serveur
   (Open-Meteo, aucune clé API requise). Voir le script en bas de page.

<script>
/* ── Fix viewport height pour Safari ancien (iPad Air 1 / tvOS) ──
   100vh y inclut la barre URL → cartes coupées en bas. On mesure la vraie
   hauteur via visualViewport ou innerHeight, et on l'expose via --vh.
   Multiples triggers car iOS Safari ne déclenche pas toujours 'resize'. */
(function(){
  function _setVh(){
    var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty('--vh', (h * 0.01) + 'px');
  }
  _setVh();
  /* Triggers standards */
  window.addEventListener('resize', _setVh);
  window.addEventListener('orientationchange', _setVh);
  window.addEventListener('load', _setVh);
  window.addEventListener('pageshow', _setVh);
  /* visualViewport API (Safari 13+) : plus fiable pour iOS */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', _setVh);
    window.visualViewport.addEventListener('scroll', _setVh);
  }
  /* Re-mesure après load des fonts (peut changer la viewport) */
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(_setVh);
  }
  /* Filet de sécurité : re-mesure 3 fois après load au cas où (~3s total) */
  window.addEventListener('load', function(){
    setTimeout(_setVh, 500);
    setTimeout(_setVh, 1500);
    setTimeout(_setVh, 3000);
  });
})();

</script>

<div id="pomo-full" aria-hidden="true">

    </svg>
  </button>
  <div id="pomo-full-clock">--:--</div>

<script>
/* ══════════════════════════════════════════
   FONDS D'ÉCRAN — code retiré (dépendait d'un backend)
   ──────────────────────────────────────────
   Fonctionnement d'origine : diaporama plein écran sur 2 calques qui
   alternaient en fondu (éléments #bg-a et #bg-b, déjà présents plus bas
   dans le HTML, transition CSS déjà en place).
   La liste des images venait d'un fichier wallpapers.json (régénéré par un
   script serveur après upload), avec un système hybride : quelques images
   locales affichées immédiatement, puis un pool d'images externes
   préchargées progressivement en arrière-plan, puis bascule une fois assez
   d'images en cache. Changement toutes les 120 secondes.
   Pour reconstruire en statique : le plus simple est un tableau JS fixe
   d'URLs d'images (dans le dépôt), avec un setInterval qui fait :
     bgA.style.backgroundImage = 'url(...)';
   puis alterne l'opacité de #bg-a / #bg-b pour le fondu (classes déjà
   stylées en CSS, transition de 2.4s déjà en place).
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function updateClock(){
  var d=new Date();
  try{
    var ft=d.toLocaleTimeString('fr-FR',{timeZone:'Europe/Paris',hour:'2-digit',minute:'2-digit',hour12:false}).split(':');
    document.getElementById('fr-h').textContent=ft[0];
    document.getElementById('fr-m').textContent=ft[1];
    var fd=d.toLocaleDateString('fr-FR',{timeZone:'Europe/Paris',weekday:'long',day:'numeric',month:'long'});
    document.getElementById('fr-date').textContent=fd.charAt(0).toUpperCase()+fd.slice(1);
    document.getElementById('vn-time').textContent=d.toLocaleTimeString('fr-FR',{timeZone:'Asia/Ho_Chi_Minh',hour:'2-digit',minute:'2-digit',hour12:false});
    var pDay=parseInt(d.toLocaleDateString('en-US',{timeZone:'Europe/Paris',day:'numeric'}),10);
    var hDay=parseInt(d.toLocaleDateString('en-US',{timeZone:'Asia/Ho_Chi_Minh',day:'numeric'}),10);
    var diff=hDay-pDay;
    document.getElementById('vn-diff').textContent=diff!==0?(diff>0?'+'+diff+'j':diff+'j'):'';
    var pomoFullClockEl = document.getElementById('pomo-full-clock');
    if(pomoFullClockEl) pomoFullClockEl.textContent = ft[0]+':'+ft[1];
  }catch(e){}
}
updateClock();
setInterval(updateClock,1000);

/* ══════════════════════════════════════════
   POMODORO — 25 min travail / 5 min pause / grande pause de 30 min
   toutes les 4 sessions de travail. Fonctionne entièrement côté client
   (aucun backend), avec un son de cloche synthétisé en direct via
   l'API Web Audio (pas de fichier audio à héberger sur GitHub Pages).
══════════════════════════════════════════ */
(function(){
  var POM_WORK = 25*60;
  var POM_BREAK = 5*60;
  var POM_LONG = 30*60;
  var POM_LONG_EVERY = 4;

  var pomCardClock = document.getElementById('card-clock');
  var pomFull = document.getElementById('pomo-full');
  var pomFullscreenBtn = document.getElementById('pom-fullscreen-btn');
  var pomFullCloseBtn = document.getElementById('pomo-full-close');

  var pomTimeEls = [document.getElementById('pom-time'), document.getElementById('pomo-full-time')];
  var pomProgEls = [document.getElementById('pom-prog'), document.getElementById('pomo-full-prog')];
  var pomBtnIcons = [document.getElementById('pom-btn-icon'), document.getElementById('pomo-full-icon')];
  var pomBtns = [document.getElementById('pom-btn'), document.getElementById('pomo-full-btn')];
  var pomDotIds = [
    ['pd0','pd1','pd2','pd3'],
    ['pfd0','pfd1','pfd2','pfd3']
  ];

  var state = {
    mode: 'work',      // 'work' | 'break' | 'long'
    remaining: POM_WORK,
    running: false
  };
  var workCount = 0;    // sessions de travail terminées (mod 4 pour les points)
  var pomInterval = null;
  var audioCtx = null;

  function pomDuration(mode){
    if(mode === 'work') return POM_WORK;
    if(mode === 'break') return POM_BREAK;
    return POM_LONG;
  }

  // Petit carillon apaisant, synthétisé (aucun fichier audio requis).
  function playChime(){
    try{
      if(!audioCtx){
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if(!Ctx) return;
        audioCtx = new Ctx();
      }
      if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
      var now = audioCtx.currentTime;
      var freqs = [660, 990, 1320]; // accord clair type carillon, non agressif
      freqs.forEach(function(f, i){
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        var start = now + i * 0.09;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12 / (i + 1), start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 1.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 2);
      });
    }catch(e){}
  }

  function unlockAudio(){
    try{
      if(!audioCtx){
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if(Ctx) audioCtx = new Ctx();
      }
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }catch(e){}
  }

  function formatMs(sec){
    var m = Math.floor(sec/60);
    var s = sec%60;
    return m+':'+(s<10?'0':'')+s;
  }

  function setModeClasses(mode){
    [pomCardClock, pomFull].forEach(function(el){
      if(!el) return;
      el.classList.remove('pom-mode-work','pom-mode-break','pom-mode-long');
      el.classList.add('pom-mode-'+mode);
    });
  }

  function renderDots(){
    var doneCount = workCount % POM_LONG_EVERY;
    if(state.mode === 'long') doneCount = POM_LONG_EVERY;
    pomDotIds.forEach(function(group){
      group.forEach(function(id, i){
        var el = document.getElementById(id);
        if(!el) return;
        el.classList.toggle('done', i < doneCount);
        el.classList.toggle('active', state.mode === 'work' && i === doneCount);
      });
    });
  }

  function render(){
    var text = formatMs(state.remaining);
    pomTimeEls.forEach(function(el){
      if(!el) return;
      el.textContent = text;
      el.classList.toggle('pom-urgent', state.remaining <= 10 && state.running);
    });
    var total = pomDuration(state.mode);
    var pct = Math.max(0, Math.min(100, ((total - state.remaining) / total) * 100));
    pomProgEls.forEach(function(el){ if(el) el.style.width = pct+'%'; });
    pomBtnIcons.forEach(function(el){
      if(!el) return;
      el.innerHTML = state.running
        ? '<rect x="2" y="1" width="2" height="8"/><rect x="6" y="1" width="2" height="8"/>'
        : '<polygon points="2,1 9,5 2,9"/>';
    });
    setModeClasses(state.mode);
    renderDots();
  }

  function tick(){
    if(!state.running) return;
    state.remaining--;
    if(state.remaining <= 0){
      advance();
    } else {
      render();
    }
  }

  function advance(){
    playChime();
    if(state.mode === 'work'){
      workCount++;
      state.mode = (workCount % POM_LONG_EVERY === 0) ? 'long' : 'break';
    } else {
      state.mode = 'work';
    }
    state.remaining = pomDuration(state.mode);
    render();
  }

  function setRunning(run){
    state.running = run;
    if(pomCardClock) pomCardClock.classList.toggle('pomo-active', run);
    if(run){
      unlockAudio();
      if(!pomInterval) pomInterval = setInterval(tick, 1000);
    } else if(pomInterval){
      clearInterval(pomInterval);
      pomInterval = null;
    }
    render();
  }

  function toggleRunning(){
    setRunning(!state.running);
  }

  pomBtns.forEach(function(btn){
    if(!btn) return;
    btn.addEventListener('click', toggleRunning);
  });

  if(pomFullscreenBtn && pomFull){
    pomFullscreenBtn.addEventListener('click', function(){
      pomFull.classList.add('open');
      pomFull.setAttribute('aria-hidden','false');
      render();
    });
  }

  function closePomoFull(){
    if(!pomFull) return;
    pomFull.classList.remove('open');
    pomFull.setAttribute('aria-hidden','true');
  }

  if(pomFullCloseBtn){ pomFullCloseBtn.addEventListener('click', closePomoFull); }
  if(pomFull){
    pomFull.addEventListener('click', function(e){
      if(e.target === pomFull) closePomoFull();
    });
  }
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closePomoFull();
  });

  render();
})();

/* ══════════════════════════════════════════
   MÉTÉO — Open-Meteo (api.open-meteo.com), aucune clé requise.
   Coordonnées : Hà Nội (21.0285, 105.8542).
══════════════════════════════════════════ */
(function(){
  var LAT = 21.0285, LON = 105.8542;
  var TZ = 'Asia/Ho_Chi_Minh';

  var elNowTemp = document.getElementById('w-now-temp');
  var elFeels = document.getElementById('w-feels');
  var elUv = document.getElementById('w-uv');
  var elForecast = document.getElementById('w-forecast');
  var elTrack = document.getElementById('w-hourly-track');
  var elNowMarker = document.getElementById('w-hourly-now');
  if(!elNowTemp || !elTrack) return;

  // Regroupe les codes météo WMO (open-meteo) en catégories simples,
  // chacune avec une icône et une teinte (verre teinté, faible opacité).
  function weatherCategory(code){
    if(code === 0) return { icon:'☀️', color:'rgba(212,168,83,.30)' };
    if(code === 1 || code === 2) return { icon:'⛅', color:'rgba(150,155,165,.22)' };
    if(code === 3) return { icon:'☁️', color:'rgba(150,155,165,.30)' };
    if(code === 45 || code === 48) return { icon:'🌫️', color:'rgba(150,155,165,.16)' };
    if([51,53,55,56,57,61,63,65,66,67,80,81,82].indexOf(code) !== -1) return { icon:'🌧️', color:'rgba(91,159,212,.30)' };
    if([71,73,75,77,85,86].indexOf(code) !== -1) return { icon:'❄️', color:'rgba(220,230,240,.30)' };
    if(code === 95 || code === 96 || code === 99) return { icon:'⛈️', color:'rgba(172,130,220,.32)' };
    return { icon:'—', color:'rgba(150,155,165,.16)' };
  }

  function buildUrl(){
    return 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + LAT + '&longitude=' + LON
      + '&current=temperature_2m,apparent_temperature,weather_code'
      + '&hourly=weather_code,uv_index'
      + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
      + '&timezone=' + encodeURIComponent(TZ)
      + '&forecast_days=4';
  }

  function renderNow(data){
    var cur = data.current;
    if(!cur) return;
    elNowTemp.textContent = Math.round(cur.temperature_2m) + '°';
    if(elFeels) elFeels.textContent = Math.round(cur.apparent_temperature) + '°';
    // UV "maintenant" : valeur horaire la plus proche de l'heure actuelle
    if(elUv && data.hourly && data.hourly.time){
      var nowIdx = data.hourly.time.indexOf(cur.time);
      if(nowIdx === -1){
        // fallback : cherche l'heure la plus proche
        var nowMs = new Date(cur.time).getTime();
        var best = 0, bestDiff = Infinity;
        data.hourly.time.forEach(function(t, i){
          var diff = Math.abs(new Date(t).getTime() - nowMs);
          if(diff < bestDiff){ bestDiff = diff; best = i; }
        });
        nowIdx = best;
      }
      var uv = data.hourly.uv_index[nowIdx];
      elUv.textContent = (uv !== undefined && uv !== null) ? Math.round(uv*10)/10 : '–';
    }
  }

  function renderForecast(data){
    if(!elForecast || !data.daily) return;
    var d = data.daily;
    var cols = elForecast.querySelectorAll('.w-fc-day, .todo-empty');
    elForecast.innerHTML = '';
    for(var i = 0; i < 4 && i < d.time.length; i++){
      var date = new Date(d.time[i] + 'T00:00:00');
      var lbl = date.toLocaleDateString('fr-FR', { weekday:'short' });
      var cat = weatherCategory(d.weather_code[i]);
      var avg = Math.round((d.temperature_2m_max[i] + d.temperature_2m_min[i]) / 2);
      var col = document.createElement('div');
      col.className = 'w-fc-day';
      col.innerHTML =
        '<span class="w-fc-lbl">' + lbl.replace('.','') + '</span>' +
        '<span class="w-fc-icon">' + cat.icon + '</span>' +
        '<span class="w-fc-temp">' + avg + '°</span>';
      elForecast.appendChild(col);
    }
  }

  function renderHourly(data){
    if(!elTrack || !data.hourly) return;
    // Nettoie les anciens segments (garde le marqueur d'heure actuelle)
    elTrack.querySelectorAll('.w-hseg').forEach(function(el){ el.remove(); });

    var codes = [];
    for(var h = 8; h <= 19; h++){
      codes.push(data.hourly.weather_code[h] !== undefined ? data.hourly.weather_code[h] : 0);
    }
    // Regroupe les heures consécutives de même catégorie en un seul segment
    var segs = [];
    var startIdx = 0;
    for(var i = 1; i <= codes.length; i++){
      var changed = (i === codes.length) || (weatherCategory(codes[i]).color !== weatherCategory(codes[startIdx]).color);
      if(changed){
        segs.push({ start:startIdx, end:i, cat:weatherCategory(codes[startIdx]) });
        startIdx = i;
      }
    }
    segs.forEach(function(seg){
      var leftPct = (seg.start / 12) * 100;
      var widthPct = ((seg.end - seg.start) / 12) * 100;
      var div = document.createElement('div');
      div.className = 'w-hseg';
      div.style.left = leftPct + '%';
      div.style.width = widthPct + '%';
      div.style.background = seg.cat.color;
      div.title = seg.cat.icon;
      elTrack.insertBefore(div, elNowMarker);
    });

    // Marqueur rouge de l'heure actuelle (visible seulement entre 8h et 20h)
    if(elNowMarker){
      var now = new Date();
      var localHour;
      try{
        localHour = parseFloat(now.toLocaleTimeString('en-GB', { timeZone:TZ, hour:'2-digit', minute:'2-digit', hour12:false }).replace(':','.'));
      }catch(e){ localHour = now.getHours() + now.getMinutes()/60; }
      if(localHour >= 8 && localHour <= 20){
        var pct = ((localHour - 8) / 12) * 100;
        elNowMarker.style.left = pct + '%';
        elNowMarker.style.display = 'block';
      } else {
        elNowMarker.style.display = 'none';
      }
    }
  }

  fetch(buildUrl())
    .then(function(r){ return r.json(); })
    .then(function(data){
      renderNow(data);
      renderForecast(data);
      renderHourly(data);
    })
    .catch(function(){
      elNowTemp.innerHTML = '<span class="err-txt">Météo indisponible</span>';
    });
})();

/* ══════════════════════════════════════════
   CALENDRIER, MINI-CALENDRIER — code retiré
   ──────────────────────────────────────────
   CALENDRIER (#cal-grid, #cal-days-bar) : vue de 4 jours simultanés,
   tranche horaire 7h-23h (52px par heure). Les événements venaient d'un
   fichier JSON généré côté serveur à partir d'un calendrier iCloud publié.
   Chaque événement était catégorisé automatiquement par mot-clé détecté
   dans son titre (sport / cours / social / tâches / jeu / défaut), avec
   une couleur dédiée par catégorie — les classes CSS existent déjà :
   .cal-evt.cat-sport, .cat-cours, .cat-social, .cat-taches, .cat-jeu.
   Le jour courant était mis en valeur (classe .is-today sur toute la
   colonne, pas seulement l'en-tête). Une ligne repère (générée en JS,
   #cal-now-line) indiquait l'heure actuelle en continu. Navigation via
   #cal-prev / #cal-next / #cal-today.

   MINI-CALENDRIER MENSUEL (#cal-mini-panel, #cal-mini-grid) : petit
   calendrier du mois courant, navigable (#mini-prev / #mini-next), jour
   actuel marqué (classe .mini-day.is-today).
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   CURSEUR — spotlight + tilt cartes
══════════════════════════════════════════ */
(function(){
  var spot   = document.getElementById('spotlight');
  var cards  = document.querySelectorAll('.card');
  var raf    = null;
  var mx = window.innerWidth/2, my = window.innerHeight/2;

  /* Spotlight global */
  if(spot){
    spot.classList.add('on');
    document.addEventListener('mousemove', function(e){
      mx = e.clientX; my = e.clientY;
      if(raf) return;
      raf = requestAnimationFrame(function(){
        raf = null;
        spot.style.setProperty('--sx', mx+'px');
        spot.style.setProperty('--sy', my+'px');
      });
    });
    /* Disparaît quand la souris quitte la fenêtre */
    document.addEventListener('mouseleave', function(){ spot.classList.remove('on'); });
    document.addEventListener('mouseenter', function(){ spot.classList.add('on'); });
  }

  /* Tilt + reflet local par carte */
  cards.forEach(function(card){
    var tiltRaf = null;
    card.addEventListener('mousemove', function(e){
      if(tiltRaf) return;
      tiltRaf = requestAnimationFrame(function(){
        tiltRaf = null;
        var rect = card.getBoundingClientRect();
        var cx = e.clientX - rect.left;
        var cy = e.clientY - rect.top;
        var px = cx / rect.width;   /* 0..1 */
        var py = cy / rect.height;
        /* Tilt max 2.5° */
        var ry =  (px - 0.5) * 5;
        var rx = -(py - 0.5) * 5;
        card.style.webkitTransform = 'perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
        card.style.transform       = 'perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
        /* Reflet local */
        card.style.setProperty('--cx', cx+'px');
        card.style.setProperty('--cy', cy+'px');
      });
    });
    card.addEventListener('mouseleave', function(){
      card.style.webkitTransform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
      card.style.transform       = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  });
})();
</script>

<script>
  (function(){
    var calPrev = document.getElementById('cal-prev');
    var calNext = document.getElementById('cal-next');
    var calToday = document.getElementById('cal-today');
    var calRange = document.getElementById('cal-range-label');
    var calDaysBar = document.getElementById('cal-days-bar');
    var calGrid = document.getElementById('cal-grid');
    if(!calPrev || !calNext || !calToday || !calRange || !calDaysBar || !calGrid) return;

    function addDays(date, days){
      var next = new Date(date.getTime());
      next.setDate(next.getDate() + days);
      return next;
    }

    function setMidnight(date){
      var copy = new Date(date.getTime());
      copy.setHours(0,0,0,0);
      return copy;
    }

    function isSameDay(a, b){
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function formatDayName(date){
      return date.toLocaleDateString('fr-FR', { weekday: 'short' });
    }

    function formatRangeLabel(start){
      var end = addDays(start, 3);
      var options = { day: 'numeric', month: 'short' };
      return start.toLocaleDateString('fr-FR', options) + ' – ' + end.toLocaleDateString('fr-FR', options);
    }

    var today = setMidnight(new Date());
    var currentStart = setMidnight(today);

    function renderCalendar(){
      calRange.textContent = formatRangeLabel(currentStart);
      var dayHeaders = ['<div></div>'];
      var gridColumns = ['<div class="cal-time-col">'];

      for(var hour = 8; hour <= 20; hour++){
        var label = hour.toString().padStart(2, '0') + 'h';
        gridColumns.push('<div class="cal-time-slot">' + label + '</div>');
      }
      gridColumns.push('</div>');

      for(var i = 0; i < 4; i++){
        var day = addDays(currentStart, i);
        var isTodayClass = isSameDay(day, today) ? ' is-today' : '';
        dayHeaders.push(
          '<div class="cal-day-hd' + isTodayClass + '">' +
            '<span class="dh-name">' + formatDayName(day) + '</span>' +
            '<span class="dh-num">' + day.getDate() + '</span>' +
          '</div>'
        );

        var daySlots = '';
        for(var h = 8; h <= 20; h++){
          daySlots += '<div class="cal-col-slot"></div>';
        }
        gridColumns.push('<div class="cal-col' + isTodayClass + '" data-date="' + day.toISOString().slice(0,10) + '">' + daySlots + '</div>');
      }

      calDaysBar.innerHTML = dayHeaders.join('');
      calGrid.innerHTML = gridColumns.join('');
    }

    function animateShift(delta, direction){
      if(calDaysBar.classList.contains('cal-transitioning')) return;
      var translate = direction === 'next' ? '12px' : '-12px';
      [calDaysBar, calGrid].forEach(function(el){
        el.style.setProperty('--cal-slide', translate);
        el.classList.add('cal-transitioning');
      });
      setTimeout(function(){
        currentStart = addDays(currentStart, delta);
        renderCalendar();
        [calDaysBar, calGrid].forEach(function(el){
          el.classList.remove('cal-transitioning');
        });
      }, 200);
    }

    calPrev.addEventListener('click', function(){
      animateShift(-4, 'prev');
    });

    calNext.addEventListener('click', function(){
      animateShift(4, 'next');
    });

    calToday.addEventListener('click', function(){
      currentStart = setMidnight(today);
      renderCalendar();
    });

    renderCalendar();
  })();
</script>
