<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Dashboard</title>

<!-- ── Favicon (onglet navigateur) ── -->
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png"/>

<!-- ── PWA : iOS / Apple ──
     'precomposed' empêche iOS d'ajouter des effets/cadres automatiques sur l'icône -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dashboard"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"/>
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png"/>
<link rel="apple-touch-icon" sizes="76x76" href="/icon-76.png"/>
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-icon-precomposed" sizes="167x167" href="/icon-167.png"/>
<link rel="apple-touch-icon-precomposed" sizes="152x152" href="/icon-152.png"/>

<!-- ── PWA : Android / Chrome ── -->
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07080b"/>
<link rel="manifest" href="/manifest.json"/>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/*
  Banshift SemiBold : placez Banshift-SemiBold.woff2 dans le même dossier et décommentez :
  @font-face {
    font-family:'Banshift';
    src:url('Banshift-SemiBold.woff2') format('woff2');
    font-weight:600;
  }
*/
:root{
  --bg:#07080b;
  --glass:rgba(6,7,12,0.20);
  --gl2:rgba(6,7,12,0.32);
  --gl-light:rgba(255,255,255,0.022);
  --border:rgba(255,255,255,0.07);
  --bds:rgba(255,255,255,0.13);
  --accent:#d4a853;
  --adim:rgba(212,168,83,0.14);
  --t1:rgba(240,236,228,0.95);
  --t2:rgba(240,236,228,0.56);
  --t3:rgba(240,236,228,0.28);
  --green:#4caf7d;--yellow:#f0b429;--red:#e05c5c;--blue:#5b9fd4;
  --r:11px;
  --fd:'Banshift','Outfit',sans-serif;
  --fm:'DM Mono',monospace;
  --fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--fb);font-weight:300;}

/* SLIDESHOW */
#bg-a,#bg-b{position:fixed;top:0;right:0;bottom:0;left:0;background-size:cover;background-position:center;z-index:0;transition:opacity 2.4s ease-in-out;}
/* Fond statique de remplacement (le diaporama dynamique d'origine a été retiré,
   voir commentaire dans le script principal) — dégradé sombre avec une touche
   d'accent doré, pour ne pas laisser un fond totalement vide. */
#bg-a{opacity:.42;background-image:radial-gradient(ellipse at 30% 20%, rgba(212,168,83,0.16) 0%, transparent 55%), linear-gradient(160deg, #10131a 0%, #05060a 100%);} 
#bg-b{opacity:0;}
#vig{position:fixed;top:0;right:0;bottom:0;left:0;background:radial-gradient(ellipse at 50% 35%,transparent 0%,rgba(4,5,9,0.58) 100%);z-index:1;pointer-events:none;}

/* ── Spotlight curseur ── */
#spotlight{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;pointer-events:none;
  background:radial-gradient(circle 420px at var(--sx,50%) var(--sy,50%),
    rgba(212,168,83,0.045) 0%,
    rgba(212,168,83,0.012) 40%,
    transparent 70%);
  transition:--sx .08s,--sy .08s;
  opacity:0;-webkit-transition:opacity .6s;transition:opacity .6s;
}
#spotlight.on{opacity:1;}

/* ── Cartes : tilt 3D au survol ── */
.card{
  -webkit-transform-style:preserve-3d;transform-style:preserve-3d;
  -webkit-transform:perspective(900px) rotateX(0) rotateY(0);
  transform:perspective(900px) rotateX(0) rotateY(0);
  -webkit-transition:transform .25s ease,box-shadow .25s ease;
  transition:transform .25s ease,box-shadow .25s ease;
  will-change:transform;
}
/* Reflet interne sur la carte — suit la souris locale */
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;z-index:0;
  background:radial-gradient(circle 180px at var(--cx,50%) var(--cy,50%),
    rgba(255,255,255,0.055) 0%,
    transparent 70%);
  pointer-events:none;opacity:0;
  -webkit-transition:opacity .3s;transition:opacity .3s;
}
.card:hover::before{opacity:1;}
/* ══════════════════════════════════════════════
   LAYOUT — compatible TV/iPad/navigateurs anciens
   gap: remplacé par margin-bottom sur les cartes
══════════════════════════════════════════════ */
.grid{
  position:relative;z-index:10;
  display:grid;
  grid-template-columns:320px 1fr;
  grid-gap:24px;
  padding:22px 24px;
  /* iPad Air 1 / tvOS : 100vh inclut la barre URL → cartes coupées en bas.
     Override avec calc(--vh * 100) où --vh est la vraie hauteur (window.innerHeight) */
  height:100vh;
  height:calc(var(--vh, 1vh) * 100);
  max-height:100vh;
  max-height:calc(var(--vh, 1vh) * 100);
  overflow:hidden;
}
.left-col{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  min-height:0;height:100%;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
.left-col::-webkit-scrollbar{display:none;}
/* Espacement via margin — fonctionne sur tout navigateur TV */
.left-col > .card{ margin-bottom:10px; flex-shrink:0; }
.left-col > .card:last-child{ margin-bottom:0; }
/* RSS dynamique — flex:1 pour remplir l'espace restant */
#card-rss{
  -webkit-box-flex:1;-ms-flex:1 1 auto;flex:1 1 auto;
  min-height:120px;overflow:hidden;
  display:flex;flex-direction:column;
}
#card-rss .ci{ height:100%; display:flex; flex-direction:column; min-height:0; }
#card-rss .rss-ticker{
  -webkit-box-flex:1;-ms-flex:1 1 auto;flex:1 1 auto;
  overflow-y:auto;overflow-x:hidden;
  min-height:0;
  padding-right:4px;
  /* Masquer la scrollbar par défaut, fine au hover */
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.1) transparent;
}
#card-rss .rss-ticker::-webkit-scrollbar{width:3px;}
#card-rss .rss-ticker::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
#card-rss .rss-ticker::-webkit-scrollbar-track{background:transparent;}
@media(min-width:1800px){
  .grid{grid-template-columns:380px 1fr;grid-gap:30px;padding:28px 30px;}
  .left-col > .card{margin-bottom:14px;}
}
@media(max-width:1023px){
  .grid{grid-template-columns:260px 1fr;grid-gap:14px;padding:14px;}
  .left-col > .card{margin-bottom:8px;}
}
@media(max-height:700px){
  #card-weather{max-height:220px;}
  .w-hourly-wrap{display:none;}
}

/* CARD */
.card{
  background:rgba(8,10,17,0.72);          /* fallback plus lumineux pour navigateurs sans backdrop-filter */
  border:2px solid rgba(255,255,255,0.11);
  border-radius:var(--r);
  overflow:hidden;position:relative;
  animation:fadeUp .5s ease both;
  flex-shrink:0;
  /* Fix border-radius+overflow sur vieux WebKit (TV, iPad ancien) */
  -webkit-mask-image:-webkit-radial-gradient(white,black);
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
  transition:border-color .25s, box-shadow .25s, -webkit-transform .25s;
  transition:border-color .25s, box-shadow .25s, transform .25s;
}
.card:hover{
  border-color:rgba(255,255,255,0.20);
  box-shadow:0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(212,168,83,.08);
  -webkit-transform:translateZ(0) translateY(-2px);
  transform:translateY(-2px);
}
/* Pas de lift sur la carte calendrier (trop grande) */
#card-cal:hover{ -webkit-transform:none; transform:none; box-shadow:0 0 0 1px rgba(212,168,83,.10); }

/* ── Effet glass moderne ──
   Quand backdrop-filter est supporté (Safari iOS 9+, Chrome 76+, Firefox 103+),
   on baisse l'opacité et le flou pour un rendu plus lumineux et net.
   Sinon on garde le fallback opaque. */
@supports (-webkit-backdrop-filter: blur(8px)) or (backdrop-filter: blur(8px)) {
  .card {
    background: rgba(8,10,17,0.40);
    -webkit-backdrop-filter: blur(8px) saturate(1.5) brightness(1.05);
    backdrop-filter: blur(8px) saturate(1.5) brightness(1.05);
  }
  #card-weather {
    background: rgba(8,10,17,0.32);
  }
}

.card::after{content:'';position:absolute;top:0;right:0;bottom:0;left:0;border-radius:inherit;background:linear-gradient(150deg,rgba(255,255,255,0.025) 0%,transparent 50%);pointer-events:none;}
.ci{padding:10px 13px;display:flex;flex-direction:column;}
#card-cal .ci{height:100%;}
.chip{font-family:var(--fm);font-size:6.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;flex-shrink:0;transition:color .2s;}
.card:hover .chip{ color:rgba(240,236,228,0.45); }
/* Horloge hover */
#card-clock:hover #fr-time{ text-shadow:0 0 22px rgba(212,168,83,.4); }
.divl{height:1px;background:rgba(255,255,255,0.10);margin:6px 0;flex-shrink:0;}

/* ══ CLOCK + POMODORO — fonctionnel ══ */
#card-clock{flex-shrink:0;overflow:hidden;}
#card-clock .ci{padding:0;overflow:hidden;}

/* Conteneur splitté côte à côte — les proportions changent quand le
   pomodoro démarre (classe .pomo-active posée sur #card-clock). */
.ck-split{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:horizontal;-webkit-box-direction:normal;
  -ms-flex-direction:row;flex-direction:row;
}

/* ─ Moitié gauche : horloge ─ */
.ck-left{
  -webkit-box-flex:1;-ms-flex:1 1 0;flex:1 1 0;min-width:0;
  border-right:1px solid rgba(255,255,255,0.11);
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:flex .45s cubic-bezier(.4,0,.2,1);
}
.ck-main{
  padding:13px 14px;
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:padding .45s cubic-bezier(.4,0,.2,1);
}
#fr-time{
  font-family:var(--fd);font-size:42px;font-weight:800;
  line-height:.95;letter-spacing:.005em;color:var(--t1);
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:horizontal;-webkit-box-direction:normal;
  -ms-flex-direction:row;flex-direction:row;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  transition:font-size .45s cubic-bezier(.4,0,.2,1),flex-direction 0s .2s;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#fr-h,#fr-m{ min-width:1.1em;text-align:center; }
.sep{color:var(--accent);margin:0 1px;} /* clignotement retiré */
#fr-date{
  font-family:var(--fm);font-size:6px;
  color:var(--t3);letter-spacing:.07em;
  margin-top:6px;text-transform:capitalize;
  transition:opacity .25s ease,max-height .3s ease;
}
.ck-vn{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-align:baseline;-ms-flex-align:baseline;align-items:baseline;
  gap:9px;padding:7px 14px 9px;
  border-top:1px solid rgba(255,255,255,0.06);
  transition:opacity .25s ease,max-height .3s ease;
}
.ck-vn-lbl{
  font-family:var(--fm);font-size:5.5px;letter-spacing:.3em;
  text-transform:uppercase;color:var(--t3);
  flex-shrink:0;
}
#vn-time{
  font-family:var(--fd);font-size:15px;font-weight:600;
  color:rgba(240,236,228,0.6);letter-spacing:.01em;line-height:1;
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#vn-diff{
  font-family:var(--fm);font-size:5.5px;color:var(--accent);
  letter-spacing:.06em;flex-shrink:0;
}
/* État pomodoro actif : l'horloge se réduit à la taille de son contenu
   (pas de largeur fixe), l'heure passe en vertical (HH au-dessus de MM)
   pour occuper le moins de place possible, avec le même espacement que
   celui du bloc pomodoro voisin. */
#card-clock.pomo-active .ck-left{ -webkit-box-flex:0;-ms-flex:0 0 auto;flex:0 0 auto; }
#card-clock.pomo-active .ck-main{ padding:10px 14px; }
#card-clock.pomo-active #fr-time{
  font-size:15px;line-height:1.15;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  gap:1px;
}
#card-clock.pomo-active #fr-time .sep{ display:none; }
#card-clock.pomo-active #fr-date,
#card-clock.pomo-active .ck-vn{ display:none; }
#card-clock.pomo-active .ck-right{ -webkit-box-flex:2;-ms-flex:2 1 0;flex:2 1 0; }

/* ─ Moitié droite : pomodoro ─ */
.ck-right{
  -webkit-box-flex:1;-ms-flex:1 1 0;flex:1 1 0;min-width:0;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  position:relative;transition:flex .45s cubic-bezier(.4,0,.2,1);
}
#pom-fullscreen-btn{
  position:absolute;top:6px;right:7px;z-index:2;
  background:none;border:none;cursor:pointer;
  color:var(--t3);font-size:11px;padding:2px 4px;line-height:1;
  transition:color .2s,-webkit-transform .15s;transition:color .2s,transform .15s;
}
#pom-fullscreen-btn:hover{color:var(--accent);-webkit-transform:scale(1.15);transform:scale(1.15);}

/* Barre fine : préréglage de rythme + compteur de séances */
.pom-topbar{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;
  padding:5px 22px 0 8px;flex-shrink:0;
}
.pom-mini-btn{
  background:none;border:1px solid var(--border);color:var(--t3);
  font-family:var(--fm);font-size:6px;letter-spacing:.06em;
  border-radius:4px;padding:2px 5px;cursor:pointer;
  transition:color .15s,border-color .15s;
}
.pom-mini-btn:hover{color:var(--accent);border-color:rgba(212,168,83,.4);}
.pom-mini-lbl{
  font-family:var(--fm);font-size:6px;letter-spacing:.1em;color:var(--t3);
  text-transform:uppercase;
}
.pom-mini-lbl b{color:var(--t2);font-weight:400;}

/* Corps : temps et contrôles juxtaposés, occupent tout l'espace disponible */
.pom-body{
  -webkit-box-flex:1;-ms-flex:1;flex:1;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:horizontal;-webkit-box-direction:normal;
  -ms-flex-direction:row;flex-direction:row;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:space-evenly;
  padding:4px 10px;gap:8px;position:relative;
}
#pom-time{
  font-family:var(--fd);font-size:36px;font-weight:800;
  letter-spacing:-.02em;line-height:1;color:var(--t1);
  transition:color .3s;
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
#pom-time.pom-urgent{color:rgba(200,90,70,.9);}
.pom-prog-track{
  position:absolute;left:0;right:0;bottom:0;width:auto;
  height:2px;background:rgba(255,255,255,.07);border-radius:0;overflow:hidden;
}
.pom-prog-bar{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width 1s linear,background .3s;}
.pom-controls{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;
  gap:8px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;
}
#pom-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--adim);
  border:1px solid rgba(212,168,83,0.35);
  color:var(--accent);
  cursor:pointer;transition:all .18s;
  display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  padding:0;flex-shrink:0;
}
#pom-btn:hover{background:rgba(212,168,83,.22);border-color:rgba(212,168,83,.65);} 
#pom-btn svg{display:block;}
.pom-dots{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;}
.pom-dot{width:4px;height:4px;border-radius:50%;background:rgba(240,236,228,.15);transition:all .4s;} 
.pom-dot.done{background:rgba(240,236,228,.35);} 
.pom-dot.active{background:var(--accent);width:10px;border-radius:2px;}


/* Couleur d'accent selon la phase (travail / pause / grande pause) */
#card-clock.pom-mode-break #pom-time,
#pomo-full.pom-mode-break #pomo-full-time{color:var(--blue);}
#card-clock.pom-mode-break .pom-prog-bar,
#pomo-full.pom-mode-break .pom-prog-bar{background:var(--blue);}
#card-clock.pom-mode-break .pom-dot.active,
#pomo-full.pom-mode-break .pom-dot.active{background:var(--blue);}
#card-clock.pom-mode-long #pom-time,
#pomo-full.pom-mode-long #pomo-full-time{color:var(--green);}
#card-clock.pom-mode-long .pom-prog-bar,
#pomo-full.pom-mode-long .pom-prog-bar{background:var(--green);}
#card-clock.pom-mode-long .pom-dot.active,
#pomo-full.pom-mode-long .pom-dot.active{background:var(--green);}

/* ══ POMODORO PLEIN ÉCRAN ══
   Le fond est une capture figée du fond d'écran au moment de l'ouverture
   (#pomo-full-bg), floutée et assombrie — le diaporama de fond continue de
   tourner derrière, mais n'est plus visible tant que ce mode est ouvert ;
   il réapparaît normalement à la fermeture. Un dégradé sombre de secours
   garantit un rendu toujours sombre/transparent même si la capture échoue. */
#pomo-full{
  position:fixed;inset:0;z-index:500;overflow:hidden;
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-orient:vertical;-webkit-box-direction:normal;
  -ms-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;
  gap:20px;
  opacity:0;visibility:hidden;pointer-events:none;
  -webkit-transform:scale(.9);transform:scale(.9);
  -webkit-transform-origin:92% 8%;transform-origin:92% 8%;
  transition:opacity .4s cubic-bezier(.22,.68,0,1.15),
             -webkit-transform .4s cubic-bezier(.22,.68,0,1.15);
  transition:opacity .4s cubic-bezier(.22,.68,0,1.15),
             transform .4s cubic-bezier(.22,.68,0,1.15);
}
#pomo-full-bg{
  position:absolute;top:-40px;right:-40px;bottom:-40px;left:-40px;z-index:0;
  background-size:cover;background-position:center;
  background-color:#0a0b0e;
  background-image:radial-gradient(ellipse at 30% 20%, rgba(212,168,83,0.12) 0%, transparent 55%), linear-gradient(160deg, #10131a 0%, #05060a 100%);
  -webkit-filter:blur(22px) saturate(1.05) brightness(.55);
  filter:blur(22px) saturate(1.05) brightness(.55);
}
#pomo-full-bg::after{
  content:'';position:absolute;inset:0;background:rgba(4,5,9,0.30);
}
#pomo-full > *:not(#pomo-full-bg){ position:relative;z-index:1; }
#pomo-full.open{
  opacity:1;visibility:visible;pointer-events:auto;
  -webkit-transform:scale(1);transform:scale(1);
}
#pomo-full-close{
  position:absolute;top:20px;right:22px;
  background:none;border:1px solid rgba(255,255,255,.12);
  color:var(--t3);width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  -webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;

/* ══════════════════════════════════════════════

#card-music{background:transparent;flex-shrink:0;overflow:hidden;position:relative;}

/* Viewport de glissement : chaque page occupe 100% de la largeur visible,

/* Sélection de source — pastilles en verre, pas du texte nu */

}

/* Pastille "en direct" — remplace la barre de progression si le flux est live */

/* ══════════════════════════════════════════════
   MÉTÉO — widget minimaliste, glass, sans appel serveur
   (Open-Meteo, aucune clé API requise). Voir le script en bas de page.
══════════════════════════════════════════════ */
#card-weather{flex-shrink:0;overflow:hidden;} /* même transparence que .card, pas d'override */
#card-weather .ci{overflow:hidden;}

/* Ressenti + UV */
.w-now{
  display:-webkit-box;display:-ms-flexbox;display:flex;
  -webkit-box-align:center;-ms-flex-align:center;align-items:center;
  gap:10px;padding-bottom:7px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.w-now-temp{
  font-family:var(--fd);font-size:34px;font-weight:800;line-height:1;
  letter-spacing:.01em;color:var(--t1);
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;
}
.w-now-meta{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;gap:3px;}
.w-now-row{display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px;-webkit-box-align:baseline;-ms-flex-align:baseline;align-items:baseline;}

.w-now-row span:last-child{font-family:var(--fm);font-size:10px;color:var(--t2);}

/* Bande horaire 8h–20h — 3x plus épaisse, avec courbe de température lissée */
.w-hourly-wrap{padding-top:9px;flex-shrink:0;}
.w-hourly-track{position:relative;height:66px;}
.w-hourly-inner{
  position:absolute;inset:0;border-radius:10px;overflow:hidden;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
}
.w-hseg{position:absolute;top:0;bottom:0;transition:opacity .3s;cursor:default;}
#w-temp-curve{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#w-temp-curve path.w-temp-fill{fill:rgba(240,236,228,0.07);stroke:none;}
#w-temp-curve path.w-temp-line{fill:none;stroke:rgba(240,236,228,0.55);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
#w-hourly-now{
  position:absolute;top:-3px;bottom:-3px;width:2px;
  background:var(--red);box-shadow:0 0 5px var(--red);
  z-index:3;display:none;
}
/* Température au croisement heure actuelle / courbe — décalée pour se superposer au point */
#w-now-on-curve{
  position:absolute;z-index:4;display:none;
  font-family:var(--fm);font-size:7px;color:var(--t1);
  background:rgba(8,10,17,0.85);border:1px solid rgba(255,255,255,.14);border-radius:5px;
  padding:1px 5px;-webkit-transform:translate(-50%,-135%);transform:translate(-50%,-135%);
  white-space:nowrap;pointer-events:none;
}
/* Repères température min / max du jour, épinglés sur la courbe */
.w-minmax-lbl{
  position:absolute;z-index:4;
  font-family:var(--fm);font-size:6.5px;color:var(--t2);
  white-space:nowrap;pointer-events:none;
}
.w-minmax-lbl.is-max{-webkit-transform:translate(-50%,-160%);transform:translate(-50%,-160%);color:rgba(240,180,41,.85);}

#w-tooltip{

  padding:5px 8px;font-family:var(--fm);font-size:7px;color:var(--t1);

  -webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;

  padding:4px 2px;border-radius:7px;transition:background .15s;

.w-fc-day .w-fc-lbl{font-family:var(--fm);font-size:6.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);}
.w-fc-day .w-fc-icon{font-size:16px;line-height:1.1;}
.w-fc-day .w-fc-temp{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--t1);
  font-variant-numeric:tabular-nums;-webkit-font-feature-settings:"tnum" 1;font-feature-settings:"tnum" 1;}

/* ══ HOVER — effets réactifs globaux ══ */
.card{ transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease; }
.card:hover{ border-color:rgba(212,168,83,0.18); box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px rgba(212,168,83,.08); }

<script>
/* ── Fix viewport height pour Safari ancien (iPad Air 1 / tvOS) ──
   100vh y inclut la barre URL → cartes coupées en bas. On mesure la vraie
   hauteur via visualViewport ou innerHeight, et on l'expose via --vh.
   Multiples triggers car iOS Safari ne déclenche pas toujours 'resize'. */
(function(){
  function _setVh(){
    var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty('--vh', (h * 0.01) + 'px');
  }
  _setVh();
  /* Triggers standards */
  window.addEventListener('resize', _setVh);
  window.addEventListener('orientationchange', _setVh);
  window.addEventListener('load', _setVh);
  window.addEventListener('pageshow', _setVh);
  /* visualViewport API (Safari 13+) : plus fiable pour iOS */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', _setVh);
    window.visualViewport.addEventListener('scroll', _setVh);
  }
  /* Re-mesure après load des fonts (peut changer la viewport) */
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(_setVh);
  }
  /* Filet de sécurité : re-mesure 3 fois après load au cas où (~3s total) */
  window.addEventListener('load', function(){
    setTimeout(_setVh, 500);
    setTimeout(_setVh, 1500);
    setTimeout(_setVh, 3000);
  });
})();

/* ── Anciennement : objet CONFIG ──
   Contenait les coordonnées météo (Hanoï), et les URLs des scripts serveur

</script>

<script>
/* ══════════════════════════════════════════
   FONDS D'ÉCRAN — code retiré (dépendait d'un backend)
   ──────────────────────────────────────────
   Fonctionnement d'origine : diaporama plein écran sur 2 calques qui
   alternaient en fondu (éléments #bg-a et #bg-b, déjà présents plus bas
   dans le HTML, transition CSS déjà en place).
   La liste des images venait d'un fichier wallpapers.json (régénéré par un
   script serveur après upload), avec un système hybride : quelques images
   locales affichées immédiatement, puis un pool d'images externes
   préchargées progressivement en arrière-plan, puis bascule une fois assez
   d'images en cache. Changement toutes les 120 secondes.
   Pour reconstruire en statique : le plus simple est un tableau JS fixe
   d'URLs d'images (dans le dépôt), avec un setInterval qui fait :
     bgA.style.backgroundImage = 'url(...)';
   puis alterne l'opacité de #bg-a / #bg-b pour le fondu (classes déjà
   stylées en CSS, transition de 2.4s déjà en place).
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function updateClock(){
  var d=new Date();
  try{
    var ft=d.toLocaleTimeString('fr-FR',{timeZone:'Europe/Paris',hour:'2-digit',minute:'2-digit',hour12:false}).split(':');
    document.getElementById('fr-h').textContent=ft[0];
    document.getElementById('fr-m').textContent=ft[1];
    var fd=d.toLocaleDateString('fr-FR',{timeZone:'Europe/Paris',weekday:'long',day:'numeric',month:'long'});
    document.getElementById('fr-date').textContent=fd.charAt(0).toUpperCase()+fd.slice(1);
    document.getElementById('vn-time').textContent=d.toLocaleTimeString('fr-FR',{timeZone:'Asia/Ho_Chi_Minh',hour:'2-digit',minute:'2-digit',hour12:false});
    var pDay=parseInt(d.toLocaleDateString('en-US',{timeZone:'Europe/Paris',day:'numeric'}),10);
    var hDay=parseInt(d.toLocaleDateString('en-US',{timeZone:'Asia/Ho_Chi_Minh',day:'numeric'}),10);
    var diff=hDay-pDay;
    document.getElementById('vn-diff').textContent=diff!==0?(diff>0?'+'+diff+'j':diff+'j'):'';
    var pomoFullClockEl = document.getElementById('pomo-full-clock');
    if(pomoFullClockEl) pomoFullClockEl.textContent = ft[0]+':'+ft[1];
  }catch(e){}
}
updateClock();
setInterval(updateClock,1000);

/* ══════════════════════════════════════════
   POMODORO — 25 min travail / 5 min pause / grande pause de 30 min
   toutes les 4 sessions de travail. Fonctionne entièrement côté client
   (aucun backend), avec un son de cloche synthétisé en direct via
   l'API Web Audio (pas de fichier audio à héberger sur GitHub Pages).
══════════════════════════════════════════ */
(function(){
  var PRESETS = [
    { work:25*60, brk:5*60,  label:'25/5' },
    { work:50*60, brk:10*60, label:'50/10' }
  ];
  var presetIdx = 0;
  var POM_LONG = 30*60;
  var POM_LONG_EVERY = 4;

  var pomCardClock = document.getElementById('card-clock');
  var pomFull = document.getElementById('pomo-full');
  var pomFullBg = document.getElementById('pomo-full-bg');
  var pomFullscreenBtn = document.getElementById('pom-fullscreen-btn');
  var pomFullCloseBtn = document.getElementById('pomo-full-close');
  var pomPresetBtn = document.getElementById('pom-preset-btn');
  var pomSessionEls = [document.getElementById('pom-session-count'), document.getElementById('pom-session-count-full')];

  var pomTimeEls = [document.getElementById('pom-time'), document.getElementById('pomo-full-time')];
  var pomProgEls = [document.getElementById('pom-prog'), document.getElementById('pomo-full-prog')];
  var pomBtnIcons = [document.getElementById('pom-btn-icon'), document.getElementById('pomo-full-icon')];
  var pomBtns = [document.getElementById('pom-btn'), document.getElementById('pomo-full-btn')];
  var pomDotIds = [
    ['pd0','pd1','pd2','pd3'],
    ['pfd0','pfd1','pfd2','pfd3']
  ];

  var state = {
    mode: 'work',      // 'work' | 'break' | 'long'
    remaining: PRESETS[presetIdx].work,
    running: false
  };
  var workCount = 0;    // séances de travail terminées (compteur global, jamais remis à zéro)
  var pomInterval = null;
  var audioCtx = null;

  function pomDuration(mode){
    if(mode === 'work') return PRESETS[presetIdx].work;
    if(mode === 'break') return PRESETS[presetIdx].brk;
    return POM_LONG;
  }

  // Petit carillon apaisant, synthétisé (aucun fichier audio requis).
  function playChime(){
    try{
      if(!audioCtx){
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if(!Ctx) return;
        audioCtx = new Ctx();
      }
      if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
      var now = audioCtx.currentTime;
      var freqs = [660, 990, 1320]; // accord clair type carillon, non agressif
      freqs.forEach(function(f, i){
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        var start = now + i * 0.09;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12 / (i + 1), start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 1.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 2);
      });
    }catch(e){}
  }

  function unlockAudio(){
    try{
      if(!audioCtx){
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if(Ctx) audioCtx = new Ctx();
      }
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }catch(e){}
  }

  function formatMs(sec){
    var m = Math.floor(sec/60);
    var s = sec%60;
    return m+':'+(s<10?'0':'')+s;
  }

  function setModeClasses(mode){
    [pomCardClock, pomFull].forEach(function(el){
      if(!el) return;
      el.classList.remove('pom-mode-work','pom-mode-break','pom-mode-long');
      el.classList.add('pom-mode-'+mode);
    });
  }

  function renderDots(){
    var doneCount = workCount % POM_LONG_EVERY;
    if(state.mode === 'long') doneCount = POM_LONG_EVERY;
    pomDotIds.forEach(function(group){
      group.forEach(function(id, i){
        var el = document.getElementById(id);
        if(!el) return;
        el.classList.toggle('done', i < doneCount);
        el.classList.toggle('active', state.mode === 'work' && i === doneCount);
      });
    });
  }

  function render(){
    var text = formatMs(state.remaining);
    pomTimeEls.forEach(function(el){
      if(!el) return;
      el.textContent = text;
      el.classList.toggle('pom-urgent', state.remaining <= 10 && state.running);
    });
    var total = pomDuration(state.mode);
    var pct = Math.max(0, Math.min(100, ((total - state.remaining) / total) * 100));
    pomProgEls.forEach(function(el){ if(el) el.style.width = pct+'%'; });
    pomBtnIcons.forEach(function(el){
      if(!el) return;
      el.innerHTML = state.running
        ? '<rect x="2" y="1" width="2" height="8"/><rect x="6" y="1" width="2" height="8"/>'
        : '<polygon points="2,1 9,5 2,9"/>';
    });
    pomSessionEls.forEach(function(el){ if(el) el.textContent = workCount; });
    if(pomPresetBtn) pomPresetBtn.textContent = PRESETS[presetIdx].label;
    setModeClasses(state.mode);
    renderDots();
  }

  function tick(){
    if(!state.running) return;
    state.remaining--;
    if(state.remaining <= 0){
      advance();
    } else {
      render();
    }
  }

  function advance(){
    playChime();
    if(state.mode === 'work'){
      workCount++;
      state.mode = (workCount % POM_LONG_EVERY === 0) ? 'long' : 'break';
    } else {
      state.mode = 'work';
    }
    state.remaining = pomDuration(state.mode);
    render();
  }

  function setRunning(run){
    state.running = run;
    if(pomCardClock) pomCardClock.classList.toggle('pomo-active', run);
    if(run){
      unlockAudio();
      if(!pomInterval) pomInterval = setInterval(tick, 1000);
    } else if(pomInterval){
      clearInterval(pomInterval);
      pomInterval = null;
    }
    render();
  }

  function toggleRunning(){
    setRunning(!state.running);
  }

  pomBtns.forEach(function(btn){
    if(!btn) return;
    btn.addEventListener('click', toggleRunning);
  });

  // Réglage du rythme travail/pause (25/5 ↔ 50/10). La séance en cours est
  // recalée sur la nouvelle durée ; la grande pause (30 min) ne change pas.
  if(pomPresetBtn){
    pomPresetBtn.addEventListener('click', function(){
      presetIdx = (presetIdx + 1) % PRESETS.length;
      if(state.mode !== 'long'){
        state.remaining = pomDuration(state.mode);
      }
      render();
    });
  }

  // Capture une image figée du fond d'écran courant (diaporama en cours),
  // pour que le fond du plein écran pomodoro ne change plus tant qu'il est
  // ouvert — le diaporama continue derrière et reprend normalement à la
  // fermeture, sans avoir été interrompu.
  function freezeWallpaper(){
    if(!pomFullBg) return;
    var bgA = document.getElementById('bg-a');
    var bgB = document.getElementById('bg-b');
    var pick = bgA;
    try{
      var opA = bgA ? parseFloat(getComputedStyle(bgA).opacity) : 0;
      var opB = bgB ? parseFloat(getComputedStyle(bgB).opacity) : 0;
      pick = (opB > opA) ? bgB : bgA;
    }catch(e){}
    var img = pick ? getComputedStyle(pick).backgroundImage : '';
    pomFullBg.style.backgroundImage = img && img !== 'none' ? img : '';
  }

  if(pomFullscreenBtn && pomFull){
    pomFullscreenBtn.addEventListener('click', function(){
      freezeWallpaper();
      pomFull.classList.add('open');
      pomFull.setAttribute('aria-hidden','false');
      render();
    });
  }

  function closePomoFull(){
    if(!pomFull) return;
    pomFull.classList.remove('open');
    pomFull.setAttribute('aria-hidden','true');
  }

  if(pomFullCloseBtn){ pomFullCloseBtn.addEventListener('click', closePomoFull); }
  if(pomFull){
    pomFull.addEventListener('click', function(e){
      if(e.target === pomFull) closePomoFull();
    });
  }
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closePomoFull();
  });

  render();
})();

/* ══════════════════════════════════════════
   MUSIQUE — carrousel 3 pages + lecteur YouTube (page « en ligne »)
══════════════════════════════════════════ */
(function(){
  var pagesWrap = document.getElementById('music-pages');
  var pages = Array.prototype.slice.call(document.querySelectorAll('.music-page'));
  var dots = Array.prototype.slice.call(document.querySelectorAll('.music-dot'));
  var prevBtn = document.getElementById('music-prev-page');
  var nextBtn = document.getElementById('music-next-page');
  var bgImg = document.getElementById('music-bg-img');
  if(!pagesWrap || !pages.length) return;

  var pageIdx = 0;

  function showPage(idx){
    pageIdx = (idx + pages.length) % pages.length;
    if(pagesWrap) pagesWrap.style.transform = 'translateX(-' + (pageIdx * (100/pages.length)) + '%)';
    dots.forEach(function(d, i){ d.classList.toggle('active', i === pageIdx); });
  }
  if(prevBtn) prevBtn.addEventListener('click', function(){ showPage(pageIdx - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function(){ showPage(pageIdx + 1); });
  dots.forEach(function(d, i){ d.addEventListener('click', function(){ showPage(i); }); });

  // ── Fond : miniature du morceau en cours, floutée ; repli sur l'icône générique ──
  function setBackgroundThumb(videoId){
    if(!bgImg) return;
    bgImg.classList.remove('loaded');
    if(!videoId){ bgImg.removeAttribute('src'); return; }
    bgImg.onload = function(){ bgImg.classList.add('loaded'); };
    bgImg.onerror = function(){ bgImg.classList.remove('loaded'); };
    bgImg.src = 'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg';
  }

  // ══ Page « en ligne » — lecteur YouTube unique (schéma officiel), 144p ══
  var YT_TRACKS = [
    { id:'eEZF9iIv5XM', label:'MedievaLo-Fi — Le chevalier médiéval' },
    { id:'jfKfPfyJRdk', label:'Lofi Girl — Chill lofi' },
    { id:'jXAEIWcGXwE', label:'Lofi Girl — Chill classique' }
  ];
  var ytActive = 0;
  var ytPlaying = false;
  var ytPlayer = null;
  var ytReady = false;
  var ytLoopMode = 0; // 0 = boucle, 1 = aléatoire
  var ytProgTimer = null;

  var ytTabs = Array.prototype.slice.call(document.querySelectorAll('#music-online-tabs .music-tab'));
  var ytTitleEl = document.getElementById('music-online-title');
  var ytPlayBtn = document.getElementById('music-online-play');
  var ytProgWrap = document.getElementById('music-online-prog-wrap');
  var ytProgBar = document.getElementById('music-online-prog');
  var ytLiveBadge = document.getElementById('music-online-live');
  var ytVolSlider = document.getElementById('music-online-vol');
  var ytLoopBtn = document.getElementById('music-online-loop');
  var ytMount = document.getElementById('music-online-mount');

  function updateTitle(){
    if(ytTitleEl) ytTitleEl.textContent = YT_TRACKS[ytActive].label;
    var widgetTitle = document.getElementById('pomo-music-title');
    if(widgetTitle) widgetTitle.textContent = YT_TRACKS[ytActive].label;
    setBackgroundThumb(YT_TRACKS[ytActive].id);
  }
  updateTitle();

  function updatePlayIcon(){
    var svgOn = '<svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor"><rect x="2" y="1" width="2" height="8"/><rect x="6" y="1" width="2" height="8"/></svg>';
    var svgOff = '<svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>';
    if(ytPlayBtn) ytPlayBtn.innerHTML = ytPlaying ? svgOn : svgOff;
    // Widget « en cours de lecture » du plein écran pomodoro (style iOS)
    var widgetBtn = document.getElementById('pomo-music-playbtn');
    if(widgetBtn) widgetBtn.innerHTML = ytPlaying ? svgOn : svgOff;
    var widget = document.getElementById('pomo-music-widget');
    if(widget) widget.classList.toggle('is-playing', ytPlaying);
  }

  function setLiveBadge(isLive){
    if(ytProgWrap) ytProgWrap.style.display = isLive ? 'none' : 'block';
    if(ytLiveBadge) ytLiveBadge.classList.toggle('show', isLive);
  }

  function toggleYtPlayPause(){
    loadYouTubeIframeApi();
    if(!ytPlayer || !ytReady){
      var tries = 0;
      var t = setInterval(function(){
        tries++;
        if(ytPlayer && ytReady){
          clearInterval(t);
          ytPlayer.playVideo();
        } else if(tries > 40){
          clearInterval(t);
        }
      }, 150);
      return;
    }
    if(ytPlaying){ ytPlayer.pauseVideo(); } else { ytPlayer.playVideo(); }
  }

  function loadYouTubeIframeApi(){
    if(window.YT && window.YT.Player){ window.onYouTubeIframeAPIReady(); return; }
    if(window.__ytApiRequested) return;
    window.__ytApiRequested = true;
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    var firstScript = document.getElementsByTagName('script')[0];
    firstScript.parentNode.insertBefore(tag, firstScript);
  }

  var previousYtReadyCb = window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady = function(){
    if(typeof previousYtReadyCb === 'function') previousYtReadyCb();
    if(!ytMount || ytPlayer) return;
    try{
      ytPlayer = new YT.Player('music-online-mount', {
        width:300, height:200,
        videoId: YT_TRACKS[ytActive].id,
        playerVars:{
          autoplay:0, mute:0, controls:0, modestbranding:1, rel:0,
          disablekb:1, fs:0, iv_load_policy:3, playsinline:1,
          origin: window.location.origin
        },
        events:{
          onReady:function(e){
            ytReady = true;
            try{
              applyVolumeFromSlider();
              e.target.setPlaybackQuality('tiny'); // 144p
            }catch(err){}
          },
          onStateChange:function(e){
            if(e.data === YT.PlayerState.PLAYING){
              ytPlaying = true;
              try{ e.target.setPlaybackQuality('tiny'); }catch(err){}
              startProgressPoll();
            } else if(e.data === YT.PlayerState.PAUSED){
              ytPlaying = false;
              stopProgressPoll();
            } else if(e.data === YT.PlayerState.ENDED){
              ytPlaying = false;
              stopProgressPoll();
              var next = ytLoopMode === 1
                ? Math.floor(Math.random() * YT_TRACKS.length)
                : ytActive;
              switchTrack(next, true);
            }
            updatePlayIcon();
          },
          onError:function(){
            var next = (ytActive + 1) % YT_TRACKS.length;
            if(next !== ytActive) switchTrack(next, ytPlaying);
          }
        }
      });
    }catch(err){}
  };

  function switchTrack(idx, autoplay){
    ytTabs.forEach(function(t,i){ t.classList.toggle('active', i===idx); });
    ytActive = idx;
    updateTitle();
    if(ytProgBar) ytProgBar.style.width = '0%';
    setLiveBadge(false);
    if(!ytPlayer || !ytReady) return;
    try{
      ytPlayer.loadVideoById({ videoId: YT_TRACKS[idx].id });
      ytPlayer.setPlaybackQuality('tiny');
      if(!autoplay) ytPlayer.pauseVideo();
    }catch(err){}
  }

  ytTabs.forEach(function(tab, i){
    tab.addEventListener('click', function(){
      if(i === ytActive) return;
      switchTrack(i, ytPlaying);
    });
  });

  if(ytPlayBtn){
    ytPlayBtn.addEventListener('click', toggleYtPlayPause);
  }
  var widgetPlayBtn0 = document.getElementById('pomo-music-playbtn');
  if(widgetPlayBtn0){ widgetPlayBtn0.addEventListener('click', toggleYtPlayPause); }

  // Volume perçu plus progressif : la position du curseur (0-100) est mappée
  // sur une courbe quadratique avant d'être appliquée au lecteur, pour que les
  // petits ajustements en bas d'échelle restent audibles/graduels (l'oreille
  // perçoit le volume de façon logarithmique, pas linéaire).
  function applyVolumeFromSlider(){
    if(!ytVolSlider) return;
    var raw = parseInt(ytVolSlider.value, 10);
    ytVolSlider.style.setProperty('--vol-pct', raw + '%');
    var perceptual = Math.round(100 * Math.pow(raw / 100, 2));
    if(ytPlayer && ytReady){
      try{ ytPlayer.setVolume(perceptual); }catch(err){}
    }
  }
  if(ytVolSlider){
    ytVolSlider.style.setProperty('--vol-pct', ytVolSlider.value + '%');
    ytVolSlider.addEventListener('input', applyVolumeFromSlider);
  }

  if(ytLoopBtn){
    ytLoopBtn.addEventListener('click', function(){
      ytLoopMode = ytLoopMode === 0 ? 1 : 0;
      ytLoopBtn.textContent = ytLoopMode === 0 ? '\u221E' : '\u21C4';
      ytLoopBtn.classList.toggle('active', ytLoopMode === 1);
      ytLoopBtn.title = ytLoopMode === 0 ? 'Boucle (piste actuelle)' : 'Aléatoire (piste suivante)';
    });
  }

  function startProgressPoll(){
    stopProgressPoll();
    ytProgTimer = setInterval(function(){
      if(!ytPlayer || !ytReady || !ytProgBar) return;
      try{
        var dur = ytPlayer.getDuration();
        var cur = ytPlayer.getCurrentTime();
        var isLive = !dur || !isFinite(dur) || dur <= 0;
        setLiveBadge(isLive);
        if(!isLive){
          ytProgBar.style.width = Math.min(100, (cur/dur)*100) + '%';
        }
      }catch(err){}
    }, 1000);
  }
  function stopProgressPoll(){ if(ytProgTimer){ clearInterval(ytProgTimer); ytProgTimer = null; } }

  if(ytProgWrap){
    ytProgWrap.addEventListener('click', function(e){
      if(!ytPlayer || !ytReady) return;
      try{
        var dur = ytPlayer.getDuration();
        if(!dur || !isFinite(dur) || dur <= 0) return; // flux en direct, non « seekable »
        var rect = ytProgWrap.getBoundingClientRect();
        var ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
        ytPlayer.seekTo(ratio * dur, true);
      }catch(err){}
    });
  }

  // Charge l'API dès l'arrivée sur la page (le morceau ne joue qu'au clic play,
  // conformément aux politiques d'autoplay des navigateurs).
  loadYouTubeIframeApi();
})();

/* ══════════════════════════════════════════
   MÉTÉO — Open-Meteo (api.open-meteo.com), aucune clé requise.
   Position : géolocalisation du navigateur ; repli sur Paris si refusée
   ou indisponible. Le fuseau horaire local vient directement de la
   réponse de l'API (utc_offset_seconds), donc valable pour n'importe
   quelle position.
══════════════════════════════════════════ */
(function(){
  var PARIS = { lat:48.8566, lon:2.3522, label:'Paris' };

  var elCity = document.getElementById('w-city');
  var elNowTemp = document.getElementById('w-now-temp');
  var elFeels = document.getElementById('w-feels');
  var elUv = document.getElementById('w-uv');
  var elForecast = document.getElementById('w-forecast');
  var elTrack = document.getElementById('w-hourly-track');
  var elInner = document.getElementById('w-hourly-inner');
  var elNowMarker = document.getElementById('w-hourly-now');
  var elCurve = document.getElementById('w-temp-curve');
  var elNowOnCurve = document.getElementById('w-now-on-curve');
  var elTooltip = document.getElementById('w-tooltip');
  if(!elNowTemp || !elTrack) return;

  // Catégorisation des codes météo WMO (Open-Meteo) : icône, teinte
  // (verre teinté, faible opacité) et libellé pour l'infobulle.
  function weatherInfo(code){
    var table = [
      { codes:[0],           icon:'☀️', color:'rgba(240,180,41,.38)',  label:'Ciel dégagé' },
      { codes:[1],           icon:'🌤️', color:'rgba(240,180,41,.24)',  label:'Plutôt dégagé' },
      { codes:[2],           icon:'⛅',  color:'rgba(180,180,175,.26)', label:'Partiellement nuageux' },
      { codes:[3],           icon:'☁️',  color:'rgba(150,155,165,.32)', label:'Couvert' },
      { codes:[45,48],       icon:'🌫️', color:'rgba(150,155,165,.18)', label:'Brouillard' },
      { codes:[51,53,55,56,57], icon:'🌦️', color:'rgba(140,190,230,.26)', label:'Bruine' },
      { codes:[61,63,66,67], icon:'🌧️', color:'rgba(91,159,212,.34)',  label:'Pluie' },
      { codes:[65,82],       icon:'🌧️', color:'rgba(55,110,170,.44)',  label:'Forte pluie' },
      { codes:[80,81],       icon:'🌦️', color:'rgba(91,159,212,.30)',  label:'Averses' },
      { codes:[71,73,75,77,85,86], icon:'❄️', color:'rgba(220,230,240,.36)', label:'Neige' },
      { codes:[95,96,99],    icon:'⛈️', color:'rgba(172,130,220,.38)', label:'Orage' }
    ];
    for(var i=0;i<table.length;i++){ if(table[i].codes.indexOf(code) !== -1) return table[i]; }
    return { icon:'—', color:'rgba(150,155,165,.16)', label:'—' };
  }

  function buildUrl(lat, lon){
    return 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + lat + '&longitude=' + lon
      + '&current=temperature_2m,apparent_temperature,weather_code'
      + '&hourly=weather_code,uv_index,temperature_2m'
      + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
      + '&timezone=auto'
      + '&forecast_days=4';
  }

  function getLocalHour(utcOffsetSeconds){
    var nowMs = Date.now();
    var localMs = nowMs + (utcOffsetSeconds * 1000);
    var d = new Date(localMs);
    return d.getUTCHours() + d.getUTCMinutes() / 60;
  }

  function renderNow(data){
    var cur = data.current;
    if(!cur) return;
    elNowTemp.textContent = Math.round(cur.temperature_2m) + '°';
    if(elFeels) elFeels.textContent = Math.round(cur.apparent_temperature) + '°';
    if(elUv && data.hourly && data.hourly.time){
      var nowIdx = data.hourly.time.indexOf(cur.time);
      if(nowIdx === -1){
        var nowMsUv = new Date(cur.time).getTime();
        var best = 0, bestDiff = Infinity;
        data.hourly.time.forEach(function(t, i){
          var diff = Math.abs(new Date(t).getTime() - nowMsUv);
          if(diff < bestDiff){ bestDiff = diff; best = i; }
        });
        nowIdx = best;
      }
      var uv = data.hourly.uv_index[nowIdx];
      elUv.textContent = (uv !== undefined && uv !== null) ? Math.round(uv*10)/10 : '–';
    }
  }

  function renderForecast(data){
    if(!elForecast || !data.daily) return;
    var d = data.daily;
    elForecast.innerHTML = '';
    for(var i = 0; i < 4 && i < d.time.length; i++){
      var date = new Date(d.time[i] + 'T00:00:00');
      var lbl = date.toLocaleDateString('fr-FR', { weekday:'short' });
      var info = weatherInfo(d.weather_code[i]);
      var avg = Math.round((d.temperature_2m_max[i] + d.temperature_2m_min[i]) / 2);
      var col = document.createElement('div');
      col.className = 'w-fc-day';
      col.innerHTML =
        '<span class="w-fc-lbl">' + lbl.replace('.','') + '</span>' +
        '<span class="w-fc-icon">' + info.icon + '</span>' +
        '<span class="w-fc-temp">' + avg + '°</span>';
      elForecast.appendChild(col);
    }
  }

  function showTooltip(html, centerPct){
    if(!elTooltip) return;
    elTooltip.innerHTML = html;
    elTooltip.classList.add('show');
    var trackW = elTrack.clientWidth;
    var ttW = elTooltip.offsetWidth;
    var left = (centerPct/100) * trackW - ttW/2;
    left = Math.max(2, Math.min(trackW - ttW - 2, left));
    elTooltip.style.left = left + 'px';
  }
  function hideTooltip(){ if(elTooltip) elTooltip.classList.remove('show'); }

  function renderHourly(data){
    if(!elTrack || !elInner || !data.hourly) return;
    elInner.querySelectorAll('.w-hseg').forEach(function(el){ el.remove(); });
    elTrack.querySelectorAll('.w-minmax-lbl').forEach(function(el){ el.remove(); });

    var codes = [], temps = [];
    for(var h = 8; h <= 19; h++){
      codes.push(data.hourly.weather_code[h] !== undefined ? data.hourly.weather_code[h] : 0);
      temps.push(data.hourly.temperature_2m[h] !== undefined ? data.hourly.temperature_2m[h] : null);
    }
    // Regroupe les heures consécutives de même condition en un seul segment
    var segs = [];
    var startIdx = 0;
    for(var i = 1; i <= codes.length; i++){
      var changed = (i === codes.length) || (weatherInfo(codes[i]).color !== weatherInfo(codes[startIdx]).color);
      if(changed){
        segs.push({ start:startIdx, end:i, info:weatherInfo(codes[startIdx]) });
        startIdx = i;
      }
    }
    segs.forEach(function(seg){
      var leftPct = (seg.start / 12) * 100;
      var widthPct = ((seg.end - seg.start) / 12) * 100;
      var segTemps = temps.slice(seg.start, seg.end).filter(function(t){ return t !== null; });
      var avgT = segTemps.length ? Math.round(segTemps.reduce(function(a,b){return a+b;},0)/segTemps.length) : null;
      var div = document.createElement('div');
      div.className = 'w-hseg';
      div.style.left = leftPct + '%';
      div.style.width = widthPct + '%';
      div.style.background = seg.info.color;
      var hStart = 8 + seg.start, hEnd = 8 + seg.end;
      var tooltipHtml = seg.info.label +
        (avgT !== null ? ' · <span class="w-tt-temp">' + avgT + '°</span>' : '') +
        ' · ' + hStart + 'h–' + hEnd + 'h';
      div.addEventListener('mouseenter', function(){ showTooltip(tooltipHtml, leftPct + widthPct/2); });
      div.addEventListener('mouseleave', hideTooltip);
      elInner.insertBefore(div, elNowMarker);
    });

    // Courbe de température lissée (aucun angle brutal : quadratique par points)
    var vw = 300, vh = 100;
    var trackH = elTrack.clientHeight || 66;
    var pxScale = trackH / vh;
    var pts = [];
    var validTemps = temps.filter(function(t){ return t !== null; });
    var tMin = validTemps.length ? Math.min.apply(null, validTemps) : 0;
    var tMax = validTemps.length ? Math.max.apply(null, validTemps) : 1;
    var range = (tMax - tMin) || 1;
    for(var p = 0; p < temps.length; p++){
      var t = temps[p] === null ? tMin : temps[p];
      var x = (p / (temps.length - 1)) * vw;
      var y = 74 - ((t - tMin) / range) * 44; // reste dans la partie haute de la bande
      pts.push({ x:x, y:y, t:t });
    }
    if(elCurve){
      var linePath = pts.length ? ('M ' + pts[0].x.toFixed(1) + ' ' + pts[0].y.toFixed(1)) : '';
      for(var k = 0; k < pts.length - 1; k++){
        var a = pts[k], b = pts[k+1];
        var midX = (a.x+b.x)/2, midY = (a.y+b.y)/2;
        linePath += (k === 0 ? ' L ' : ' Q ' + a.x.toFixed(1) + ' ' + a.y.toFixed(1) + ' ') + midX.toFixed(1) + ' ' + midY.toFixed(1);
      }
      if(pts.length > 1){
        var last = pts[pts.length-1], prev = pts[pts.length-2];
        linePath += ' Q ' + prev.x.toFixed(1) + ' ' + prev.y.toFixed(1) + ' ' + last.x.toFixed(1) + ' ' + last.y.toFixed(1);
      }
      var fillPath = linePath + ' L ' + vw + ' ' + vh + ' L 0 ' + vh + ' Z';
      elCurve.innerHTML =
        '<path class="w-temp-fill" d="' + fillPath + '"></path>' +
        '<path class="w-temp-line" d="' + linePath + '"></path>';
    }

    // Repères min / max du jour, épinglés sur la courbe à l'heure où ils surviennent
    if(pts.length){
      var minIdx = 0, maxIdx = 0;
      pts.forEach(function(pt, idx){
        if(pt.t < pts[minIdx].t) minIdx = idx;
        if(pt.t > pts[maxIdx].t) maxIdx = idx;
      });
      [{ idx:maxIdx, cls:'is-max' }, { idx:minIdx, cls:'is-min' }].forEach(function(m){
        var pt = pts[m.idx];
        var lbl = document.createElement('div');
        lbl.className = 'w-minmax-lbl ' + m.cls;
        lbl.style.left = ((pt.x / vw) * 100) + '%';
        lbl.style.top = (pt.y * pxScale) + 'px';
        lbl.textContent = Math.round(pt.t) + '°';
        elTrack.appendChild(lbl);
      });
    }

    // Marqueur rouge de l'heure actuelle + température au point de croisement
    // avec la courbe (interpolée, légèrement décalée pour se superposer au trait).
    var localHour = getLocalHour(data.utc_offset_seconds || 0);
    if(elNowMarker || elNowOnCurve){
      var inRange = localHour >= 8 && localHour <= 20;
      if(elNowMarker){
        if(inRange){
          var pct = ((localHour - 8) / 12) * 100;
          elNowMarker.style.left = pct + '%';
          elNowMarker.style.display = 'block';
        } else {
          elNowMarker.style.display = 'none';
        }
      }
      if(elNowOnCurve){
        if(inRange && pts.length > 1){
          var wf = (localHour - 8) / 12;
          var pFloatIdx = wf * (pts.length - 1);
          var i0 = Math.max(0, Math.min(pts.length - 1, Math.floor(pFloatIdx)));
          var i1 = Math.min(pts.length - 1, i0 + 1);
          var frac = pFloatIdx - i0;
          var interpT = pts[i0].t + (pts[i1].t - pts[i0].t) * frac;
          var interpY = pts[i0].y + (pts[i1].y - pts[i0].y) * frac;
          var pctNow = ((localHour - 8) / 12) * 100;
          elNowOnCurve.style.left = pctNow + '%';
          elNowOnCurve.style.top = (interpY * pxScale) + 'px';
          elNowOnCurve.textContent = Math.round(interpT) + '°';
          elNowOnCurve.style.display = 'block';
        } else {
          elNowOnCurve.style.display = 'none';
        }
      }
    }
  }

  function loadWeather(lat, lon, label){
    if(elCity) elCity.textContent = label;
    fetch(buildUrl(lat, lon))
      .then(function(r){ return r.json(); })
      .then(function(data){
        renderNow(data);
        renderForecast(data);
        renderHourly(data);
      })
      .catch(function(){
        elNowTemp.innerHTML = '<span class="err-txt">Météo indisponible</span>';
      });
  }

  function useFallback(){ loadWeather(PARIS.lat, PARIS.lon, PARIS.label); }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        loadWeather(pos.coords.latitude, pos.coords.longitude, 'Ma position');
      },
      function(){ useFallback(); },
      { timeout: 6000, maximumAge: 10*60*1000 }
    );
  } else {
    useFallback();
  }
})();

/* ══════════════════════════════════════════
   CALENDRIER, MINI-CALENDRIER — code retiré
   ──────────────────────────────────────────
   CALENDRIER (#cal-grid, #cal-days-bar) : vue de 4 jours simultanés,
   tranche horaire 7h-23h (52px par heure). Les événements venaient d'un
   fichier JSON généré côté serveur à partir d'un calendrier iCloud publié.
   Chaque événement était catégorisé automatiquement par mot-clé détecté
   dans son titre (sport / cours / social / tâches / jeu / défaut), avec
   une couleur dédiée par catégorie — les classes CSS existent déjà :
   .cal-evt.cat-sport, .cat-cours, .cat-social, .cat-taches, .cat-jeu.
   Le jour courant était mis en valeur (classe .is-today sur toute la
   colonne, pas seulement l'en-tête). Une ligne repère (générée en JS,
   #cal-now-line) indiquait l'heure actuelle en continu. Navigation via
   #cal-prev / #cal-next / #cal-today.

   MINI-CALENDRIER MENSUEL (#cal-mini-panel, #cal-mini-grid) : petit
   calendrier du mois courant, navigable (#mini-prev / #mini-next), jour
   actuel marqué (classe .mini-day.is-today).
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   CURSEUR — spotlight + tilt cartes
══════════════════════════════════════════ */
(function(){
  var spot   = document.getElementById('spotlight');
  var cards  = document.querySelectorAll('.card');
  var raf    = null;
  var mx = window.innerWidth/2, my = window.innerHeight/2;

  /* Spotlight global */
  if(spot){
    spot.classList.add('on');
    document.addEventListener('mousemove', function(e){
      mx = e.clientX; my = e.clientY;
      if(raf) return;
      raf = requestAnimationFrame(function(){
        raf = null;
        spot.style.setProperty('--sx', mx+'px');
        spot.style.setProperty('--sy', my+'px');
      });
    });
    /* Disparaît quand la souris quitte la fenêtre */
    document.addEventListener('mouseleave', function(){ spot.classList.remove('on'); });
    document.addEventListener('mouseenter', function(){ spot.classList.add('on'); });
  }

  /* Tilt + reflet local par carte */
  cards.forEach(function(card){
    var tiltRaf = null;
    card.addEventListener('mousemove', function(e){
      if(tiltRaf) return;
      tiltRaf = requestAnimationFrame(function(){
        tiltRaf = null;
        var rect = card.getBoundingClientRect();
        var cx = e.clientX - rect.left;
        var cy = e.clientY - rect.top;
        var px = cx / rect.width;   /* 0..1 */
        var py = cy / rect.height;
        /* Tilt max 2.5° */
        var ry =  (px - 0.5) * 5;
        var rx = -(py - 0.5) * 5;
        card.style.webkitTransform = 'perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
        card.style.transform       = 'perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
        /* Reflet local */
        card.style.setProperty('--cx', cx+'px');
        card.style.setProperty('--cy', cy+'px');
      });
    });
    card.addEventListener('mouseleave', function(){
      card.style.webkitTransform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
      card.style.transform       = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  });
})();
</script>
<script>
  (function(){
    var script = document.createElement('script');
    script.defer = true;
    script.src = 'assets/js/wallpapers.js?cb=' + Date.now();
    document.head.appendChild(script);

<script>
  (function(){
    var calPrev = document.getElementById('cal-prev');
    var calNext = document.getElementById('cal-next');
    var calToday = document.getElementById('cal-today');
    var calRange = document.getElementById('cal-range-label');
    var calDaysBar = document.getElementById('cal-days-bar');
    var calGrid = document.getElementById('cal-grid');
    if(!calPrev || !calNext || !calToday || !calRange || !calDaysBar || !calGrid) return;

    function addDays(date, days){
      var next = new Date(date.getTime());
      next.setDate(next.getDate() + days);
      return next;
    }

    function setMidnight(date){
      var copy = new Date(date.getTime());
      copy.setHours(0,0,0,0);
      return copy;
    }

    function isSameDay(a, b){
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function formatDayName(date){
      return date.toLocaleDateString('fr-FR', { weekday: 'short' });
    }

    function formatRangeLabel(start){
      var end = addDays(start, 3);
      var options = { day: 'numeric', month: 'short' };
      return start.toLocaleDateString('fr-FR', options) + ' – ' + end.toLocaleDateString('fr-FR', options);
    }

    var today = setMidnight(new Date());
    var currentStart = setMidnight(today);

    function renderCalendar(){
      calRange.textContent = formatRangeLabel(currentStart);
      var dayHeaders = ['<div></div>'];
      var gridColumns = ['<div class="cal-time-col">'];

      for(var hour = 8; hour <= 20; hour++){
        var label = hour.toString().padStart(2, '0') + 'h';
        gridColumns.push('<div class="cal-time-slot">' + label + '</div>');
      }
      gridColumns.push('</div>');

      for(var i = 0; i < 4; i++){
        var day = addDays(currentStart, i);
        var isTodayClass = isSameDay(day, today) ? ' is-today' : '';
        dayHeaders.push(
          '<div class="cal-day-hd' + isTodayClass + '">' +
            '<span class="dh-name">' + formatDayName(day) + '</span>' +
            '<span class="dh-num">' + day.getDate() + '</span>' +
          '</div>'
        );

        var daySlots = '';
        for(var h = 8; h <= 20; h++){
          daySlots += '<div class="cal-col-slot"></div>';
        }
        gridColumns.push('<div class="cal-col' + isTodayClass + '" data-date="' + day.toISOString().slice(0,10) + '">' + daySlots + '</div>');
      }

      calDaysBar.innerHTML = dayHeaders.join('');
      calGrid.innerHTML = gridColumns.join('');
    }

    function animateShift(delta, direction){
      if(calDaysBar.classList.contains('cal-transitioning')) return;
      var translate = direction === 'next' ? '12px' : '-12px';
      [calDaysBar, calGrid].forEach(function(el){
        el.style.setProperty('--cal-slide', translate);
        el.classList.add('cal-transitioning');
      });
      setTimeout(function(){
        currentStart = addDays(currentStart, delta);
        renderCalendar();
        [calDaysBar, calGrid].forEach(function(el){
          el.classList.remove('cal-transitioning');
        });
      }, 200);
    }

    calPrev.addEventListener('click', function(){
      animateShift(-4, 'prev');
    });

    calNext.addEventListener('click', function(){
      animateShift(4, 'next');
    });

    calToday.addEventListener('click', function(){
      currentStart = setMidnight(today);
      renderCalendar();
    });

    renderCalendar();
  })();
</script>
