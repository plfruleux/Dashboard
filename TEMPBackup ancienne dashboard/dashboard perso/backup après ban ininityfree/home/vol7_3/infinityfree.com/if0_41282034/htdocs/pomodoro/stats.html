<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Focus Sanctuary — Statistiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0704;--surface:rgba(245,238,224,0.035);--border:rgba(245,238,224,0.08);
  --acc:#c9a86c;--acc-dim:rgba(201,168,108,0.12);
  --t1:rgba(245,238,224,0.92);--t2:rgba(245,238,224,0.52);--t3:rgba(245,238,224,0.22);
  --fd:'Playfair Display',Georgia,serif;
  --fc:'Cormorant Garamond',Georgia,serif;
  --fm:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--fc);}
body{padding:40px 32px;max-width:840px;margin:0 auto;}

/* Header */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:48px;}
.page-title{font-family:var(--fd);font-size:34px;font-weight:400;font-style:italic;color:var(--t1);}
.page-subtitle{font-family:var(--fm);font-size:7.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--t3);margin-top:5px;}
.back-link{
  font-family:var(--fm);font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--t3);text-decoration:none;
  border:1px solid var(--border);padding:8px 14px;border-radius:3px;
  transition:all .2s;
}
.back-link:hover{border-color:var(--acc);color:var(--acc);}

/* Cards de métriques */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:40px;}
.metric{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:20px 18px;
}
.metric-val{
  font-family:var(--fd);font-size:36px;font-weight:600;
  color:var(--t1);line-height:1;margin-bottom:8px;
}
.metric-lbl{
  font-family:var(--fm);font-size:7px;letter-spacing:.25em;
  text-transform:uppercase;color:var(--t3);margin-bottom:4px;
}
.metric-sub{
  font-family:var(--fc);font-size:12px;font-style:italic;color:var(--t3);
}
.metric.accent .metric-val{color:var(--acc);}
.metric.accent{border-color:rgba(201,168,108,0.18);background:var(--acc-dim);}

/* Section */
.section{margin-bottom:36px;}
.section-title{
  font-family:var(--fm);font-size:7px;letter-spacing:.35em;
  text-transform:uppercase;color:var(--t3);
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

/* Graphique à barres — 14 jours */
.chart-wrap{overflow-x:auto;}
.chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding-bottom:20px;position:relative;min-width:400px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0;}
.bar{
  width:100%;border-radius:2px 2px 0 0;
  background:linear-gradient(180deg,var(--acc),rgba(201,168,108,0.4));
  transition:height .6s cubic-bezier(.4,0,.2,1);min-height:0;
  position:relative;
}
.bar.today{background:linear-gradient(180deg,#e8c07a,var(--acc));}
.bar:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);
  font-family:var(--fm);font-size:7px;color:var(--acc);white-space:nowrap;
  background:rgba(10,7,4,.92);border:1px solid var(--border);
  padding:3px 7px;border-radius:3px;pointer-events:none;z-index:10;
}
.bar-lbl{font-family:var(--fm);font-size:6px;color:var(--t3);letter-spacing:.04em;text-align:center;}
.bar-lbl.today{color:var(--acc);}

/* Tableau des sessions récentes */
.sessions-table{width:100%;border-collapse:collapse;}
.sessions-table thead th{
  font-family:var(--fm);font-size:7px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--t3);
  text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);
}
.sessions-table tbody tr{border-bottom:1px solid rgba(245,238,224,0.04);transition:background .15s;}
.sessions-table tbody tr:hover{background:var(--surface);}
.sessions-table tbody td{
  font-family:var(--fc);font-size:14px;color:var(--t2);
  padding:10px 12px;
}
.sessions-table tbody td.mono{font-family:var(--fm);font-size:8px;color:var(--t3);letter-spacing:.08em;}
.sessions-table tbody td.big{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--t1);}
.sessions-table .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--acc);margin-right:8px;vertical-align:middle;}

/* Jour de la semaine */
.dow{font-family:var(--fm);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px;}
.heatmap{display:flex;gap:3px;}
.hm-col{display:flex;flex-direction:column;gap:3px;}
.hm-cell{
  width:12px;height:12px;border-radius:2px;
  background:rgba(245,238,224,0.05);transition:background .3s;
}

/* Loading */
.loading{font-family:var(--fm);font-size:9px;letter-spacing:.2em;color:var(--t3);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.8}}

/* Empty state */
.empty{
  text-align:center;padding:40px;
  font-family:var(--fc);font-style:italic;font-size:18px;color:var(--t3);
}

@media(max-width:600px){
  body{padding:24px 18px;}
  .metrics{grid-template-columns:repeat(2,1fr);}
  .page-header{flex-direction:column;align-items:flex-start;gap:16px;}
}
</style>
</head>
<body>

<header class="page-header">
  <div>
    <div class="page-title">Carnets de sessions</div>
    <div class="page-subtitle">Focus Sanctuary — Tableau de bord</div>
  </div>
  <a href="index.php" class="back-link">← Retour au timer</a>
</header>

<!-- Métriques -->
<div class="metrics">
  <div class="metric accent">
    <div class="metric-lbl">Aujourd'hui</div>
    <div class="metric-val" id="m-today"><span class="loading">…</span></div>
    <div class="metric-sub" id="m-today-s"></div>
  </div>
  <div class="metric">
    <div class="metric-lbl">Cette semaine</div>
    <div class="metric-val" id="m-week"><span class="loading">…</span></div>
    <div class="metric-sub" id="m-week-s"></div>
  </div>
  <div class="metric">
    <div class="metric-lbl">Ce mois</div>
    <div class="metric-val" id="m-month"><span class="loading">…</span></div>
    <div class="metric-sub" id="m-month-s"></div>
  </div>
  <div class="metric">
    <div class="metric-lbl">Depuis le début</div>
    <div class="metric-val" id="m-total"><span class="loading">…</span></div>
    <div class="metric-sub" id="m-total-s"></div>
  </div>
</div>

<!-- Graphique 14 jours -->
<div class="section">
  <div class="section-title">14 derniers jours</div>
  <div class="chart-wrap">
    <div class="chart" id="chart"><span class="loading">Chargement…</span></div>
  </div>
</div>

<!-- Sessions récentes -->
<div class="section">
  <div class="section-title">Sessions récentes</div>
  <div id="table-wrap"><span class="loading">Chargement…</span></div>
</div>

<script>
var API = '/pomodoro/api.php';

function xhr(url, cb) {
  var x = new XMLHttpRequest();
  x.open('GET', url+'&_='+Date.now(), true);
  x.onreadystatechange = function() {
    if (x.readyState===4 && x.status===200) {
      try { cb(JSON.parse(x.responseText)); } catch(e) {}
    }
  };
  x.send();
}

function fmtH(m) {
  if (!m) return '0h';
  var h = Math.floor(m/60), mn = m%60;
  return h>0 ? h+'h'+(mn>0?' '+mn+'m':'') : mn+'m';
}
function fmtSessions(m) {
  var s = Math.round(m/25);
  return s > 0 ? '≈ '+s+' session'+(s>1?'s':'') : '';
}

var DAYS = ['dim','lun','mar','mer','jeu','ven','sam'];
var MONTHS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

function renderChart(daily, labels) {
  var chart = document.getElementById('chart');
  chart.innerHTML = '';
  var max = Math.max.apply(null, daily) || 1;
  var today = new Date().toISOString().slice(0,10);
  daily.forEach(function(min, i) {
    var d = new Date(labels[i]+'T12:00:00');
    var isToday = labels[i] === today;
    var h = min > 0 ? Math.max(4, Math.round((min/max)*80)) : 0;
    var col = document.createElement('div');
    col.className = 'bar-col';
    var bar = document.createElement('div');
    bar.className = 'bar'+(isToday?' today':'');
    bar.style.height = h+'px';
    bar.setAttribute('data-tip', fmtH(min) || '–');
    var lbl = document.createElement('div');
    lbl.className = 'bar-lbl'+(isToday?' today':'');
    lbl.textContent = i%2===0 ? DAYS[d.getDay()] : '';
    col.appendChild(bar); col.appendChild(lbl);
    chart.appendChild(col);
  });
}

function renderTable(recent) {
  var wrap = document.getElementById('table-wrap');
  if (!recent || !recent.length) {
    wrap.innerHTML = '<div class="empty">Aucune session enregistrée pour l\'instant.</div>';
    return;
  }
  var html = '<table class="sessions-table"><thead><tr><th>Date</th><th>Heure</th><th>Durée</th></tr></thead><tbody>';
  recent.forEach(function(r) {
    var d = new Date(r.date+'T'+r.time+':00');
    var dayName = DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];
    html += '<tr><td><span class="dot"></span>'+dayName+'</td>'
      + '<td class="mono">'+r.time+'</td>'
      + '<td class="big">'+r.min+'<span style="font-size:14px;font-weight:400;color:var(--t3)"> min</span></td></tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

xhr(API+'?action=stats', function(d) {
  document.getElementById('m-today').textContent   = fmtH(d.today);
  document.getElementById('m-today-s').textContent = fmtSessions(d.today);
  document.getElementById('m-week').textContent    = fmtH(d.week);
  document.getElementById('m-week-s').textContent  = fmtSessions(d.week);
  document.getElementById('m-month').textContent   = fmtH(d.month);
  document.getElementById('m-month-s').textContent = fmtSessions(d.month);
  document.getElementById('m-total').textContent   = fmtH(d.total);
  document.getElementById('m-total-s').textContent = fmtSessions(d.total);
  if (d.daily && d.labels) renderChart(d.daily, d.labels);
  if (d.recent) renderTable(d.recent);
});
</script>
</body>
</html>
